<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 64 64%27%3E%3Ccircle cx=%2732%27 cy=%2732%27 r=%2732%27 fill=%27%23b0842c%27/%3E%3Ctext x=%2732%27 y=%2745%27 font-size=%2734%27 text-anchor=%27middle%27 fill=%27white%27 font-family=%27serif%27%3E%D8%B4%3C/text%3E%3C/svg%3E">
<title>Онлайн-школа рукии</title>
<link rel="stylesheet" href="../design/tokens.css?v=10">
<link rel="stylesheet" href="../design/base.css?v=26">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
<style>
  .doc-meta { display: flex; align-items: center; gap: var(--rp-space-3); flex-wrap: wrap; margin-bottom: var(--rp-space-5); }
  .doc-body h2 { margin-top: var(--rp-space-6); }
  .doc-body table { width: 100%; border-collapse: collapse; margin: var(--rp-space-4) 0; }
  .doc-body th, .doc-body td { border: 1px solid var(--rp-learn-border); padding: var(--rp-space-2) var(--rp-space-3); text-align: left; font-size: var(--rp-fs-sm); }
  .doc-body th { background: var(--rp-color-parchment-200); }
  /* Богословские/предупредительные примечания в тексте книги (⚠️) — раньше
     рендерились как обычный blockquote без стиля, визуально не отличались
     от прозы (независимая проверка, 2026-07-19). */
  .doc-body blockquote { margin: var(--rp-space-5) 0; padding: var(--rp-space-4);
    border-left: 4px solid var(--rp-status-danger); background: color-mix(in srgb, var(--rp-status-danger) 10%, var(--rp-learn-surface));
    border-radius: 0 var(--rp-radius-sm) var(--rp-radius-sm) 0; }
  .doc-body blockquote p:last-child { margin-bottom: 0; }
  .book-exam-cta { margin-top: var(--rp-space-6); padding: var(--rp-space-5); text-align: center; }
  .book-exam-cta__actions { display: flex; gap: var(--rp-space-3); justify-content: center; flex-wrap: wrap; margin-top: var(--rp-space-4); }
  .doc-toc { background: var(--rp-learn-surface); border: 1px solid var(--rp-learn-border); border-radius: var(--rp-radius-md);
    padding: var(--rp-space-4); margin-bottom: var(--rp-space-5); }
  .doc-toc__title { font-size: var(--rp-fs-sm); font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
    opacity: 0.7; margin: 0 0 var(--rp-space-2); }
  .doc-toc ol { margin: 0; padding-left: 1.2rem; }
  .doc-toc li { margin-bottom: var(--rp-space-1); }
  .doc-toc a { text-decoration: none; color: var(--rp-learn-accent-strong); }
  .doc-toc a:hover { text-decoration: underline; }
  @media print {
    .no-print { display: none !important; }
    body { background: #fff; }
    .doc-body { color: #000; }
  }
</style>
</head>
<body data-zone="learn">
  <div id="site-header" class="no-print"></div>
  <main class="container">
    <div class="no-print" style="display:flex; justify-content:space-between; align-items:center; gap: var(--rp-space-3); flex-wrap: wrap;">
      <a id="back-link" href="#" class="btn btn-ghost btn-sm">← Назад</a>
      <button id="print-btn" class="btn btn-outline btn-sm" type="button" hidden>🖨️ Распечатать / сохранить PDF</button>
    </div>
    <div id="doc-root" class="card" style="margin-top: var(--rp-space-4);">
      <p class="skeleton-loading">Загрузка…</p>
    </div>
  </main>
  <div id="site-footer" class="no-print"></div>

  <script type="module">
    import { renderHeader, renderFooter } from "./js/layout.js?v=12";
    import { loadMarkdownDoc, renderDocInto, applyPaywall, applyRegisterWall } from "./js/markdown-loader.js?v=9";
    import { bookKey, MODULES } from "./js/modules-data.js?v=14";
    import { withBase } from "./js/base-path.js?v=6";
    import { watchAuth, getStudentProfile, isAdmin } from "../integration/auth.js?v=8";
    import { getFullBookContent } from "../integration/firestore.js?v=11";

    renderHeader("learn");
    renderFooter();

    const params = new URLSearchParams(location.search);
    const docPath = params.get("doc");
    const root = document.getElementById("doc-root");

    function findLesson(doc) {
      for (const m of MODULES) {
        const lesson = m.lessons.find((l) => l.doc === doc);
        if (lesson) return lesson;
      }
      return null;
    }

    // Ссылка "Назад" всегда ведёт на страницу модуля-владельца книги (реальный
    // href, работает даже без JS/истории). Если видно, что пришли с этого же
    // сайта (document.referrer) — используем history.back() для более точного
    // "назад", иначе обычный переход по href.
    const backLink = document.getElementById("back-link");
    const owningModule = MODULES.find((m) => m.lessons.some((l) => l.doc === docPath));
    const fallbackHref = owningModule
      ? withBase(`/pages/modules/module.html?id=${owningModule.id}`)
      : withBase("/pages/modules/index.html");
    backLink.href = fallbackHref;
    let sameOriginReferrer = false;
    try { sameOriginReferrer = document.referrer && new URL(document.referrer).origin === location.origin; } catch { /* invalid referrer URL */ }
    if (sameOriginReferrer) {
      backLink.addEventListener("click", (e) => { e.preventDefault(); history.back(); });
    }

    /** Три уровня доступа (project.md §18, решение 2026-07-17) — сама
     * логика applyPaywall/applyRegisterWall теперь в markdown-loader.js
     * (общая для этой страницы и modules/module.html, независимая проверка
     * 2026-07-19). */

    /** Оглавление + оценка времени чтения — ориентиры для длинного текста
     * (план улучшения курса, 2026-07-18, "chunking"): не режем сам текст
     * (он прошёл триаж §7/§9), только добавляем навигацию по уже готовому
     * контенту. Показываем только когда текст открыт целиком (unlocked) —
     * для урезанного отрывка оглавление бессмысленно. */
    function addReadingAids(root) {
      const bodyEl = root.querySelector(".doc-body");
      const metaEl = root.querySelector(".doc-meta");
      if (!bodyEl) return;

      const words = bodyEl.textContent.trim().split(/\s+/).filter(Boolean).length;
      const minutes = Math.max(1, Math.round(words / 200));
      if (metaEl) {
        const time = document.createElement("p");
        time.className = "form-note";
        time.textContent = `≈ ${minutes} мин чтения`;
        metaEl.appendChild(time);
      }

      const headings = Array.from(bodyEl.querySelectorAll("h2"));
      if (headings.length < 2) return;
      headings.forEach((h, i) => { h.id = `sec-${i}`; });
      const toc = document.createElement("nav");
      toc.className = "doc-toc";
      toc.setAttribute("aria-label", "Оглавление");
      toc.innerHTML = `
        <p class="doc-toc__title">Оглавление</p>
        <ol>${headings.map((h) => `<li><a href="#${h.id}">${h.textContent}</a></li>`).join("")}</ol>`;
      bodyEl.before(toc);
    }

    function examCtaHtml(progress) {
      const lesson = findLesson(docPath);
      if (!lesson?.exam) return "";
      const state = progress?.books?.[bookKey(docPath)];
      const done = state?.status === "done";
      return `
        <div class="card book-exam-cta" ${done ? `style="border-color: var(--rp-status-success);"` : ""}>
          <h3>${done ? "Экзамен по этой книге сдан" : "Прочитали книгу?"}</h3>
          <p class="form-note">${done ? `Результат — ${Math.round(state.quizScore * 100)}%. Можно пересдать, если хотите улучшить.` : "Сдайте короткий экзамен по ней — порог 70%."}</p>
          <div class="book-exam-cta__actions">
            <a class="btn btn-outline" href="${withBase("/pages/tests/index.html")}">Перейти к тестам</a>
            <a class="btn btn-primary" href="quiz/index.html?exam=${encodeURIComponent(lesson.exam)}">${done ? "Пересдать экзамен →" : "Перейти к экзамену →"}</a>
          </div>
        </div>`;
    }

    if (!docPath) {
      root.innerHTML = "<p>Не указан документ (параметр ?doc=).</p>";
    } else {
      loadMarkdownDoc(docPath)
        .then((doc) => {
          renderDocInto(root, doc);
          const bodyEl = root.querySelector(".doc-body");
          const ctaRoot = document.createElement("div");
          ctaRoot.className = "no-print";
          root.after(ctaRoot);
          const printBtn = document.getElementById("print-btn");
          printBtn.addEventListener("click", () => window.print());
          watchAuth(async (user) => {
            if (!user) {
              if (bodyEl) applyRegisterWall(bodyEl);
              return;
            }
            const [profile, admin] = await Promise.all([getStudentProfile(user.uid), isAdmin(user.uid)]);
            const unlocked = admin || !!profile?.paid;
            if (bodyEl && !unlocked) applyPaywall(bodyEl);
            if (bodyEl && unlocked) {
              // Полный текст — из Firestore (реальная защита, не то, что уже
              // лежит в открытом content/*.md). Пока миграция
              // (scripts/seed-paid-content.mjs) не запущена для этого docId,
              // getFullBookContent() вернёт null — тогда оставляем то, что
              // уже отрисовано из статического файла, ничего не ломаем.
              const full = await getFullBookContent(bookKey(docPath));
              if (full?.body) {
                bodyEl.innerHTML = window.marked ? window.marked.parse(full.body) : bodyEl.innerHTML;
                bodyEl.querySelectorAll("table").forEach((table) => {
                  const wrap = document.createElement("div");
                  wrap.className = "table-scroll";
                  table.replaceWith(wrap);
                  wrap.appendChild(table);
                });
              }
              addReadingAids(root);
            }
            // Кнопка печати — только когда есть что печатать (независимая
            // проверка, 2026-07-19): раньше показывалась сразу всем, включая
            // гостя за стеной регистрации.
            if (unlocked) printBtn.hidden = false;
            // Экзамен по книге — только после полного текста (project.md §18):
            // нет смысла сдавать тест по книге, которую не дали дочитать.
            if (unlocked) ctaRoot.innerHTML = examCtaHtml(profile?.progress);
          });
        })
        .catch((err) => {
          root.innerHTML = `<p class="field-error">Не удалось загрузить материал: ${err.message}</p>`;
        });
    }
  </script>
</body>
</html>
