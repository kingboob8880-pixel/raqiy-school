<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Онлайн-школа рукии</title>
<link rel="stylesheet" href="../design/tokens.css?v=6">
<link rel="stylesheet" href="../design/base.css?v=10">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  .doc-meta { display: flex; align-items: center; gap: var(--rp-space-3); flex-wrap: wrap; margin-bottom: var(--rp-space-5); }
  .doc-body h2 { margin-top: var(--rp-space-6); }
  .doc-body table { width: 100%; border-collapse: collapse; margin: var(--rp-space-4) 0; }
  .doc-body th, .doc-body td { border: 1px solid var(--rp-learn-border); padding: var(--rp-space-2) var(--rp-space-3); text-align: left; font-size: var(--rp-fs-sm); }
  .doc-body th { background: var(--rp-color-parchment-200); }
  .book-exam-cta { margin-top: var(--rp-space-6); padding: var(--rp-space-5); text-align: center; }
</style>
</head>
<body data-zone="learn">
  <div id="site-header"></div>
  <main class="container" style="padding-block: var(--rp-space-6);">
    <a href="javascript:history.back()" class="btn btn-ghost btn-sm">← Назад</a>
    <div id="doc-root" class="card" style="margin-top: var(--rp-space-4);">
      <p class="skeleton-loading">Загрузка…</p>
    </div>
  </main>
  <div id="site-footer"></div>

  <script type="module">
    import { renderHeader, renderFooter } from "./js/layout.js?v=6";
    import { loadMarkdownDoc, renderDocInto } from "./js/markdown-loader.js?v=6";
    import { bookKey } from "./js/modules-data.js?v=7";
    import { BOOK_QUIZZES } from "./js/book-quiz-data.js?v=7";
    import { watchAuth, getStudentProfile } from "../integration/auth.js?v=6";

    renderHeader("learn");
    renderFooter();

    const params = new URLSearchParams(location.search);
    const docPath = params.get("doc");
    const root = document.getElementById("doc-root");

    function examCtaHtml(progress) {
      if (!BOOK_QUIZZES[docPath]) return "";
      const state = progress?.books?.[bookKey(docPath)];
      if (state?.status === "done") {
        return `
          <div class="card book-exam-cta" style="border-color: var(--rp-status-success);">
            <p style="margin:0;">✓ Экзамен по этой книге сдан — ${Math.round(state.quizScore * 100)}%</p>
          </div>`;
      }
      return `
        <div class="card book-exam-cta">
          <h3>Прочитали книгу?</h3>
          <p class="form-note">Сдайте короткий экзамен по ней — порог 70%.</p>
          <a class="btn btn-primary" href="quiz/index.html?doc=${encodeURIComponent(docPath)}">Сдать экзамен по книге →</a>
        </div>`;
    }

    if (!docPath) {
      root.innerHTML = "<p>Не указан документ (параметр ?doc=).</p>";
    } else {
      loadMarkdownDoc(docPath)
        .then((doc) => {
          renderDocInto(root, doc);
          const ctaRoot = document.createElement("div");
          root.after(ctaRoot);
          watchAuth(async (user) => {
            if (!user) { ctaRoot.innerHTML = BOOK_QUIZZES[docPath] ? examCtaHtml(null) : ""; return; }
            const profile = await getStudentProfile(user.uid);
            ctaRoot.innerHTML = examCtaHtml(profile?.progress);
          });
        })
        .catch((err) => {
          root.innerHTML = `<p class="field-error">Не удалось загрузить материал: ${err.message}</p>`;
        });
    }
  </script>
</body>
</html>
