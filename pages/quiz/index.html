<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Тест — Онлайн-школа рукии</title>
<link rel="stylesheet" href="../../design/tokens.css?v=6">
<link rel="stylesheet" href="../../design/base.css?v=8">
</head>
<body data-zone="learn">
  <div id="site-header"></div>
  <main class="container" style="padding-block: var(--rp-space-6); max-width: 40rem;">
    <div id="quiz-root" class="skeleton-loading">Загрузка…</div>
  </main>
  <div id="site-footer"></div>

  <script type="module">
    import { renderHeader, renderFooter } from "../js/layout.js?v=6";
    import { getModule, QUIZ_PASS_THRESHOLD } from "../js/modules-data.js?v=6";
    import { QUIZZES } from "../js/quiz-data.js?v=6";
    import { watchAuth } from "../../integration/auth.js?v=6";
    import { recordQuizResult } from "../../integration/firestore.js?v=7";

    renderHeader("learn");
    renderFooter();

    const params = new URLSearchParams(location.search);
    const moduleId = Number(params.get("module"));
    const mod = getModule(moduleId);
    const questions = QUIZZES[moduleId];
    const root = document.getElementById("quiz-root");

    let currentUser = null;
    watchAuth((user) => { currentUser = user; });

    if (!mod || !questions) {
      root.innerHTML = `<p>Тест для этого модуля пока не готов.</p>`;
    } else {
      let current = 0;
      const answers = new Array(questions.length).fill(null);

      function render() {
        const q = questions[current];
        root.innerHTML = `
          <p class="form-note">Модуль ${mod.id}. ${mod.title} · Вопрос ${current + 1} из ${questions.length}</p>
          <div class="quiz-progress"><div class="quiz-progress__bar" style="width:${(current / questions.length) * 100}%"></div></div>
          <h2>${q.q}</h2>
          <div id="options"></div>
          <button id="next-btn" class="btn btn-primary" disabled>Далее</button>
        `;
        const optionsRoot = document.getElementById("options");
        q.options.forEach((opt, i) => {
          const btn = document.createElement("button");
          btn.className = "quiz-option";
          btn.type = "button";
          btn.textContent = opt;
          btn.addEventListener("click", () => {
            answers[current] = i;
            [...optionsRoot.children].forEach((c) => c.setAttribute("aria-pressed", "false"));
            btn.setAttribute("aria-pressed", "true");
            document.getElementById("next-btn").disabled = false;
          });
          optionsRoot.appendChild(btn);
        });
        document.getElementById("next-btn").addEventListener("click", () => {
          if (current < questions.length - 1) { current++; render(); }
          else finish();
        });
      }

      async function finish() {
        const correctCount = answers.filter((a, i) => a === questions[i].correct).length;
        const ratio = correctCount / questions.length;
        const passed = ratio >= QUIZ_PASS_THRESHOLD;

        if (currentUser) {
          try { await recordQuizResult(currentUser.uid, mod.id, ratio); } catch (e) { console.warn(e); }
        }

        root.innerHTML = `
          <div class="card" style="text-align:center;">
            <h2>${passed ? "Тест пройден" : "Тест не пройден"}</h2>
            <p style="font-size: var(--rp-fs-2xl); font-family: var(--rp-font-heading);">${Math.round(ratio * 100)}%</p>
            <p class="form-note">Порог прохождения — ${Math.round(QUIZ_PASS_THRESHOLD * 100)}%.</p>
            ${passed
              ? `<a class="btn btn-primary" href="../dashboard/student.html">Вернуться в кабинет</a>`
              : `<button class="btn btn-outline" onclick="location.reload()">Пройти ещё раз</button>`}
          </div>
        `;
      }

      render();
    }
  </script>
</body>
</html>
