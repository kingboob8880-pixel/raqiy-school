<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 64 64%27%3E%3Ccircle cx=%2732%27 cy=%2732%27 r=%2732%27 fill=%27%23b0842c%27/%3E%3Ctext x=%2732%27 y=%2745%27 font-size=%2734%27 text-anchor=%27middle%27 fill=%27white%27 font-family=%27serif%27%3E%D8%B4%3C/text%3E%3C/svg%3E">
<title>Тест — Онлайн-школа рукии</title>
<link rel="stylesheet" href="../../design/tokens.css?v=10">
<link rel="stylesheet" href="../../design/base.css?v=35">
</head>
<body data-zone="learn">
  <div id="site-header"></div>
  <main class="container container--narrow">
    <div id="quiz-root" class="skeleton-loading">Загрузка…</div>
  </main>
  <div id="site-footer"></div>

  <script type="module">
    import { renderHeader, renderFooter } from "../js/layout.js?v=12";
    import { getModule, QUIZ_PASS_THRESHOLD, MODULES, bookKey } from "../js/modules-data.js?v=16";
    import { QUIZZES } from "../js/quiz-data.js?v=7";
    import { loadExamDoc } from "../js/exam-loader.js?v=7";
    import { watchAuth, getStudentProfile, isAdmin } from "../../integration/auth.js?v=8";
    import { recordQuizResult, recordBookQuizResult } from "../../integration/firestore.js?v=13";
    import { withBase } from "../js/base-path.js?v=6";

    renderHeader("learn");
    renderFooter();

    const params = new URLSearchParams(location.search);
    const params_moduleId = Number(params.get("module"));
    const examPath = params.get("exam");
    const root = document.getElementById("quiz-root");

    // Экзамен по книге (?exam=<content/exams/....md>) — markdown-контент,
    // project.md §5. Тест по модулю (?module=N) — прежний JS-банк вопросов
    // по всему модулю целиком.
    const isBookQuiz = !!examPath;

    let currentUser = null;

    // Раньше этой проверки не было вообще — init() вызывался безусловно
    // внизу файла, и реальные вопросы+варианты ответов экзамена отдавались
    // ЛЮБОМУ, включая гостя без аккаунта, просто по прямой ссылке (независимая
    // проверка, 2026-07-20: "работа над тестами и экзаменом"). Это серьёзнее,
    // чем уже закрытая дыра со статическим .md-файлом книги — здесь даже не
    // нужно смотреть вкладку "Сеть", достаточно открыть URL. Экзамены — часть
    // курса, которая по всей остальной сайту продаётся как платная (лендинг,
    // book.html/module.html), поэтому тот же трёхуровневый доступ, что и у
    // текста книги: гость — регистрация, зарегистрированный неоплативший —
    // предложение оплаты, оплативший/админ — тест целиком.
    function accessWallHtml(kind) {
      if (kind === "guest") {
        return `
          <div class="card paywall-card">
            <h3>Зарегистрируйтесь, чтобы пройти тест</h3>
            <p class="form-note">Экзамены — часть платного курса. Регистрация бесплатна и займёт меньше минуты.</p>
            <div class="book-exam-cta__actions">
              <a class="btn btn-primary" href="${withBase("/pages/auth/register.html")}">Зарегистрироваться бесплатно</a>
              <a class="btn btn-outline" href="${withBase("/pages/auth/login.html")}">Уже есть аккаунт? Войти</a>
            </div>
          </div>`;
      }
      return `
        <div class="card paywall-card">
          <h3>Экзамены открываются после оплаты курса</h3>
          <p class="form-note">Пока доступны бесплатные ознакомительные отрывки книг. Экзамены, как и полный текст курса, входят в оплату целиком.</p>
          <p class="paywall-card__price">30 000 ₽</p>
          <div class="book-exam-cta__actions">
            <a class="btn btn-primary" href="https://t.me/ruqoq" target="_blank" rel="noopener">Написать лекарю в Telegram</a>
            <a class="btn btn-outline" href="${withBase("/pages/dashboard/student.html")}">Вернуться в кабинет</a>
          </div>
        </div>`;
    }

    async function init() {
      let mod, questions, quizTitle, resultKey;

      if (isBookQuiz) {
        const owner = MODULES.find((m) => m.lessons.some((l) => l.exam === examPath));
        const lesson = owner?.lessons.find((l) => l.exam === examPath);
        if (!owner || !lesson) {
          root.innerHTML = `<p>Экзамен не найден.</p>`;
          return;
        }
        try {
          const exam = await loadExamDoc(examPath);
          mod = owner;
          questions = exam.questions;
          quizTitle = exam.meta.title || lesson.title;
          resultKey = bookKey(lesson.doc);
        } catch (err) {
          root.innerHTML = `<p class="field-error">${err.message}</p>`;
          return;
        }
      } else {
        mod = getModule(params_moduleId);
        questions = QUIZZES[params_moduleId];
        quizTitle = mod ? `Модуль ${mod.id}. ${mod.title}` : "";
        resultKey = mod?.id;
      }

      if (!mod || !questions || !questions.length) {
        root.innerHTML = `<p>Тест для ${isBookQuiz ? "этой книги" : "этого модуля"} пока не готов.</p>`;
        return;
      }

      let current = 0;
      const answers = new Array(questions.length).fill(null);

      // Ссылка выхода до завершения — раньше единственным способом уйти
      // было закрыть вкладку (независимая проверка, 2026-07-19).
      const exitHref = isBookQuiz ? withBase(`/pages/modules/module.html?id=${mod.id}`) : withBase("/pages/dashboard/student.html");

      function render() {
        const q = questions[current];
        root.innerHTML = `
          <a class="btn btn-ghost btn-sm" href="${exitHref}" style="margin-bottom: var(--rp-space-3);">← Прервать тест</a>
          <p class="form-note">${quizTitle} · Вопрос ${current + 1} из ${questions.length}</p>
          <div class="quiz-progress" role="progressbar" aria-valuenow="${current}" aria-valuemin="0" aria-valuemax="${questions.length}"><div class="quiz-progress__bar" style="width:${(current / questions.length) * 100}%"></div></div>
          <h2>${q.q}</h2>
          <div id="options"></div>
          <p id="quiz-feedback" class="quiz-feedback" role="status" aria-live="polite"></p>
          <button id="next-btn" class="btn btn-primary" disabled>Далее</button>
        `;
        const optionsRoot = document.getElementById("options");
        const feedbackEl = document.getElementById("quiz-feedback");
        const nextBtn = document.getElementById("next-btn");
        let answered = false;

        // Мгновенная обратная связь сразу после ответа (retrieval practice —
        // план улучшения курса, 2026-07-18, второй проход): сначала попытка
        // вспомнить (клик), затем сразу видно верно/неверно и правильный
        // вариант — так материал закрепляется лучше, чем узнав % только в конце.
        q.options.forEach((opt, i) => {
          const btn = document.createElement("button");
          btn.className = "quiz-option";
          btn.type = "button";
          btn.textContent = opt;
          btn.setAttribute("aria-pressed", "false");
          btn.addEventListener("click", () => {
            if (answered) return;
            answered = true;
            answers[current] = i;
            const isCorrect = i === q.correct;
            btn.setAttribute("aria-pressed", "true");
            btn.classList.add(isCorrect ? "is-correct" : "is-wrong");
            if (!isCorrect) optionsRoot.children[q.correct].classList.add("is-correct");
            [...optionsRoot.children].forEach((c) => { c.disabled = true; });
            feedbackEl.textContent = isCorrect ? "✅ Верно!" : "❌ Неверно — правильный ответ отмечен выше.";
            nextBtn.disabled = false;
            nextBtn.textContent = current < questions.length - 1 ? "Далее" : "Завершить";
            nextBtn.focus();
          });
          optionsRoot.appendChild(btn);
        });
        nextBtn.addEventListener("click", () => {
          if (current < questions.length - 1) { current++; render(); }
          else finish();
        });
      }

      async function finish() {
        const correctCount = answers.filter((a, i) => a === questions[i].correct).length;
        const ratio = correctCount / questions.length;
        const passed = ratio >= QUIZ_PASS_THRESHOLD;

        let saveFailed = false;
        if (currentUser) {
          try {
            if (isBookQuiz) await recordBookQuizResult(currentUser.uid, resultKey, ratio);
            else await recordQuizResult(currentUser.uid, resultKey, ratio);
          } catch (e) { console.warn(e); saveFailed = true; }
        }

        const backHref = isBookQuiz ? `../modules/module.html?id=${mod.id}` : "../dashboard/student.html";
        const backLabel = isBookQuiz ? "Вернуться к модулю" : "Вернуться в кабинет";

        // Разбор ответов после непройденного теста (project.md §22, backlog
        // "постраничный разбор ответов после несданного теста" — раньше
        // экран результата показывал только итоговый %, хотя во время
        // самого теста подсказка по каждому вопросу уже была видна один раз
        // и пропадала. Только для непройденного — прошедшему разбирать
        // нечего, он и так помнит верные ответы по мгновенной обратной связи.
        const reviewHtml = !passed ? `
          <div class="card" style="margin-top: var(--rp-space-4); text-align:left;">
            <h3>Разбор ответов</h3>
            <ol class="quiz-review">
              ${questions.map((q, i) => {
                const isCorrect = answers[i] === q.correct;
                return `
                  <li class="quiz-review__item ${isCorrect ? "is-correct" : "is-wrong"}">
                    <p class="quiz-review__q">${isCorrect ? "✅" : "❌"} ${q.q}</p>
                    ${!isCorrect ? `<p class="form-note">Ваш ответ: ${q.options[answers[i]] ?? "—"}</p>` : ""}
                    <p class="form-note">Правильный ответ: ${q.options[q.correct]}</p>
                  </li>`;
              }).join("")}
            </ol>
          </div>` : "";

        root.innerHTML = `
          <div class="card quiz-result ${passed ? "quiz-result--passed" : ""}" style="text-align:center;">
            <div class="quiz-result__icon" aria-hidden="true">${passed ? "🎉" : "📖"}</div>
            <h2>${passed ? "Тест пройден" : "Тест не пройден"}</h2>
            <p class="quiz-result__score">${Math.round(ratio * 100)}%</p>
            <p class="form-note">Порог прохождения — ${Math.round(QUIZ_PASS_THRESHOLD * 100)}%.</p>
            ${saveFailed ? `<p class="field-error">Не удалось сохранить результат (нет связи). Прогресс в кабинете не обновится — попробуйте пройти тест ещё раз позже.</p>` : ""}
            ${!currentUser ? `<p class="form-note">Вы не вошли в кабинет — результат не сохранён. <a href="${withBase("/pages/auth/login.html")}">Войдите</a>, чтобы прогресс учитывался.</p>` : ""}
            ${passed
              ? `<a class="btn btn-primary" href="${backHref}">${backLabel}</a>`
              : `<button class="btn btn-outline" onclick="location.reload()">Пройти ещё раз</button>`}
          </div>
          ${reviewHtml}
        `;
      }

      render();
    }

    let started = false;
    watchAuth(async (user) => {
      currentUser = user;
      if (started) return; // не пересобираем уже идущий тест на повторных событиях auth
      if (!user) {
        root.innerHTML = accessWallHtml("guest");
        return;
      }
      let unlocked = false;
      try {
        const [profile, admin] = await Promise.all([getStudentProfile(user.uid), isAdmin(user.uid)]);
        unlocked = admin || !!profile?.paid;
      } catch (err) {
        console.warn(err);
        root.innerHTML = `
          <p class="field-error">Не удалось проверить доступ — проверьте связь с интернетом.</p>
          <button class="btn btn-outline btn-sm" type="button" onclick="location.reload()">Повторить</button>`;
        return;
      }
      if (!unlocked) {
        root.innerHTML = accessWallHtml("unpaid");
        return;
      }
      started = true;
      init();
    });
  </script>
</body>
</html>
