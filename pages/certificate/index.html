<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 64 64%27%3E%3Ccircle cx=%2732%27 cy=%2732%27 r=%2732%27 fill=%27%23b0842c%27/%3E%3Ctext x=%2732%27 y=%2745%27 font-size=%2734%27 text-anchor=%27middle%27 fill=%27white%27 font-family=%27serif%27%3E%D8%B4%3C/text%3E%3C/svg%3E">
<title>Сертификат — Онлайн-школа рукии</title>
<link rel="stylesheet" href="../../design/tokens.css?v=20">
<link rel="stylesheet" href="../../design/base.css?v=46">
<style>
  .cert-frame { max-width: 42rem; margin: var(--rp-space-6) auto; padding: var(--rp-space-3);
    background: var(--rp-color-parchment-50); border-radius: var(--rp-radius-lg);
    box-shadow: 0 24px 60px rgba(40, 30, 10, 0.16); border: 1px solid rgba(43, 36, 23, 0.1); }
  .cert { position: relative; overflow: hidden; text-align: center; padding: var(--rp-space-7) var(--rp-space-6);
    border: 2px solid var(--rp-color-gold-400); border-radius: var(--rp-radius-md);
    background: radial-gradient(600px 300px at 50% 0%, #fff, #fbf3e3); }
  .cert > * { position: relative; z-index: 1; }
  .cert__inset { position: absolute; inset: 0.6rem; border: 1px solid rgba(192, 147, 48, 0.35);
    border-radius: var(--rp-radius-sm); pointer-events: none; }
  .cert__spark { position: absolute; width: 9rem; height: 9rem; opacity: 0.09; color: var(--rp-color-gold-500); pointer-events: none; }
  .cert__spark--tl { left: -1.9rem; top: -2.2rem; }
  .cert__spark--br { right: -1.9rem; bottom: -2.2rem; }
  .cert__basmala { font-family: var(--rp-font-arabic); font-size: var(--rp-fs-arabic); color: var(--rp-color-gold-500); margin: 0 0 var(--rp-space-4); }
  .cert__eyebrow { font-size: var(--rp-fs-sm); font-weight: 800; letter-spacing: 0.24em; text-transform: uppercase; color: var(--rp-color-gold-600); margin: 0; }
  .cert__name { font-family: var(--rp-font-heading); font-weight: 800; font-size: var(--rp-fs-2xl); color: #221c11; margin: var(--rp-space-3) 0 var(--rp-space-2); }
  .cert__desc { font-size: var(--rp-fs-sm); color: #5c5138; max-width: 26rem; margin: 0 auto; line-height: 1.6; }
  .cert__divider { width: 4.4rem; height: 2px; background: var(--rp-color-gold-400); margin: var(--rp-space-5) auto; }
  .cert__footer { display: flex; justify-content: space-between; align-items: flex-end; gap: var(--rp-space-3); margin-top: var(--rp-space-3); flex-wrap: wrap; }
  .cert__sign, .cert__date { flex: 1 1 8rem; }
  .cert__date { text-align: right; }
  .cert__sign-name { font-family: var(--rp-font-heading); font-style: italic; font-size: var(--rp-fs-lg); color: #221c11; }
  .cert__sign-role, .cert__date-label { font-size: var(--rp-fs-sm); color: #8a7c5a; border-top: 1px solid rgba(43, 36, 23, 0.2); padding-top: 0.25rem; margin-top: 0.15rem; }
  .cert__date-value { font-size: var(--rp-fs-sm); color: #5c5138; }
  .cert__seal { flex: 0 0 auto; width: 4rem; height: 4rem; border-radius: var(--rp-radius-pill); border: 2px solid var(--rp-color-gold-400);
    display: flex; align-items: center; justify-content: center; color: var(--rp-color-gold-500); font-size: 0.7rem; font-weight: 800; line-height: 1.15; text-align: center; }
  .cert__watermark {
    position: absolute; top: 0.9rem; right: 0.9rem;
    font-family: var(--rp-font-body); font-size: var(--rp-fs-sm); font-weight: 800; letter-spacing: 0.08em;
    text-transform: uppercase; color: #fff; background: var(--rp-color-gold-500);
    border-radius: var(--rp-radius-pill); padding: 0.35rem 0.9rem;
    pointer-events: none; user-select: none; z-index: 2; box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }
  @media print { .no-print { display: none; } }
</style>
</head>
<body data-zone="learn">
  <noscript><p style="text-align:center;padding:2rem;">Для работы сайта необходим JavaScript. Пожалуйста, включите его в настройках браузера.</p></noscript>
  <div id="site-header" class="no-print"></div>
  <main class="container">
    <p class="form-note" id="cert-intro" style="text-align:center; max-width: 32rem; margin: var(--rp-space-5) auto;">Загрузка…</p>
    <div id="cert-root"></div>
    <div id="cert-status" class="no-print" style="text-align:center; margin-top: var(--rp-space-5);"></div>
  </main>
  <div id="site-footer" class="no-print"></div>

  <script type="module">
    import { renderHeader, renderFooter } from "../js/layout.js?v=14";
    import { MODULES } from "../js/modules-data.js?v=33";
    import { watchAuth, getStudentProfile } from "../../integration/auth.js?v=9";
    import { withBase } from "../js/base-path.js?v=6";

    renderHeader("learn");
    renderFooter();

    const introEl = document.getElementById("cert-intro");
    const root = document.getElementById("cert-root");
    const statusRoot = document.getElementById("cert-status");

    const SPARK_PATH = `<path fill="currentColor" d="M50 3l6 30 30 6-30 6-6 30-6-30-30-6 30-6z"/>`;

    function certHtml({ name, sample, dateStr }) {
      return `
        <div class="cert-frame">
          <div class="cert">
            <div class="cert__inset" aria-hidden="true"></div>
            <svg class="cert__spark cert__spark--tl" viewBox="0 0 100 100" aria-hidden="true">${SPARK_PATH}</svg>
            <svg class="cert__spark cert__spark--br" viewBox="0 0 100 100" aria-hidden="true">${SPARK_PATH}</svg>
            ${sample ? `<span class="cert__watermark" aria-hidden="true">Пример</span>` : ""}
            <p class="cert__basmala" lang="ar" dir="rtl">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</p>
            <p class="cert__eyebrow">Сертификат о завершении</p>
            <div class="cert__name">${name}</div>
            <p class="cert__desc">прошёл(-ла) полный курс подготовки заклинателя (раки) — 11 модулей,
               25 книг, от основ убеждённости до итоговой практики под супервизией наставника.</p>
            <div class="cert__divider" aria-hidden="true"></div>
            <div class="cert__footer">
              <div class="cert__sign">
                <div class="cert__sign-name">Абу Мухаммад</div>
                <div class="cert__sign-role">Основатель школы</div>
              </div>
              <div class="cert__seal">РУКИЯ<br>${new Date().getFullYear()}</div>
              <div class="cert__date">
                <div class="cert__date-value">${dateStr}</div>
                <div class="cert__date-label">Дата выдачи</div>
              </div>
            </div>
          </div>
        </div>`;
    }

    // Показываем образец сразу всем, без входа — так лендинг может честно
    // показать, что получит ученик в конце (project.md, решение 2026-07-17).
    introEl.textContent = "Так будет выглядеть ваш сертификат после завершения курса — это пример, не настоящий документ.";
    root.innerHTML = certHtml({ name: "Абдуллах", sample: true, dateStr: new Date().toLocaleDateString("ru-RU") });
    statusRoot.innerHTML = `<a class="btn btn-primary" href="${withBase("/pages/auth/register.html")}">Начать бесплатно →</a>`;

    watchAuth(async (user) => {
      if (!user) return; // гость уже видит образец выше, дальше ничего не грузим
      const profile = await getStudentProfile(user.uid);
      const done = MODULES.filter((m) => profile?.progress?.[m.id]?.status === "done").length;
      const allDone = done === MODULES.length || !!profile?.certificateGranted;

      if (!allDone) {
        statusRoot.innerHTML = `
          <div class="card" style="max-width: 32rem; margin: 0 auto; text-align:center;">
            <h3 style="margin-bottom: var(--rp-space-2);">Ваш сертификат ещё не готов</h3>
            <p class="form-note">Пройдено модулей: ${done} из ${MODULES.length}. Сертификат
               выдаётся после завершения всех модулей и прохождения всех тестов.</p>
            <a class="btn btn-primary" href="${withBase("/pages/modules/index.html")}">Продолжить обучение</a>
          </div>`;
        return;
      }

      introEl.textContent = "Поздравляем — курс пройден полностью. Вот ваш сертификат:";
      const completionDate = profile?.completedAt?.toDate?.() ?? new Date();
      root.innerHTML = certHtml({ name: profile.name || "Ученик", sample: false, dateStr: completionDate.toLocaleDateString("ru-RU") });
      // Скачивание RUKYA PRO — программа для приёма пациентов, обещанная в
      // Модуле 11 — открывается только тем, кто реально закончил курс
      // (та же проверка allDone, что решает, показывать ли сам сертификат
      // выше), запрос автора "выдаём ученикам как только они заканчивают
      // своё обучение", 2026-07-21. Файл лежит в самом репозитории сайта
      // (assets/downloads/) — простое и быстрое решение, но не абсолютная
      // защита: прямая ссылка технически доступна и без входа тому, кто её
      // узнает, тот же уровень защиты, что и у остального статичного
      // контента сайта (видео, изображения). Для более строгой защиты
      // (доступ только через проверку Firebase после входа) нужен Firebase
      // Storage с правилами доступа — не настроено.
      statusRoot.innerHTML = `
        <div style="display:flex; gap:var(--rp-space-3); justify-content:center; flex-wrap:wrap;">
          <button class="btn btn-primary" id="dl-pdf">Скачать PDF</button>
          <button class="btn btn-outline" id="dl-png">Скачать PNG</button>
          <button class="btn btn-outline" onclick="window.print()">Распечатать</button>
        </div>
        <div class="card" style="max-width: 32rem; margin: var(--rp-space-5) auto; text-align:center;">
          <h3 style="margin-bottom: var(--rp-space-2);">RUKYA PRO — программа для приёма пациентов</h3>
          <p class="form-note">Теперь, когда курс завершён, можно скачать RUKYA PRO — рабочую
             программу для ведения пациентов (из Модуля 11). Работает офлайн, без браузера,
             все данные хранятся только на вашем компьютере.</p>
          <a class="btn btn-primary" style="margin-top: var(--rp-space-3);"
             href="${withBase("/assets/downloads/RUKYA-PRO-Setup-1.0.0.exe")}" download>Скачать RUKYA PRO (.exe, ~87 МБ) →</a>
          <p class="form-note" style="margin-top: var(--rp-space-2);">При первом запуске Windows
             может показать предупреждение SmartScreen (программа новая, без платной цифровой
             подписи) — это ожидаемо, нужно нажать «Подробнее» → «Выполнить в любом случае».</p>
        </div>`;

      // Скачивание PDF и PNG через html2canvas + jsPDF (CDN)
      const certEl = root.querySelector(".cert-frame");
      async function loadHtml2Canvas() {
        if (window.html2canvas) return;
        await new Promise((resolve, reject) => {
          const s = document.createElement("script");
          s.src = "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
          s.onload = resolve; s.onerror = reject;
          document.head.appendChild(s);
        });
      }
      async function loadJsPDF() {
        if (window.jspdf) return;
        await new Promise((resolve, reject) => {
          const s = document.createElement("script");
          s.src = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js";
          s.onload = resolve; s.onerror = reject;
          document.head.appendChild(s);
        });
      }

      document.getElementById("dl-png").addEventListener("click", async () => {
        const btn = document.getElementById("dl-png");
        btn.disabled = true; btn.textContent = "Подготовка…";
        try {
          await loadHtml2Canvas();
          const canvas = await html2canvas(certEl, { scale: 2, useCORS: true, backgroundColor: "#fbf3e3" });
          const a = document.createElement("a");
          a.href = canvas.toDataURL("image/png");
          a.download = "сертификат-рукия.png";
          a.click();
        } catch (e) { console.error(e); alert("Не удалось создать PNG — попробуйте ещё раз."); }
        btn.disabled = false; btn.textContent = "Скачать PNG";
      });

      document.getElementById("dl-pdf").addEventListener("click", async () => {
        const btn = document.getElementById("dl-pdf");
        btn.disabled = true; btn.textContent = "Подготовка…";
        try {
          await loadHtml2Canvas();
          await loadJsPDF();
          const canvas = await html2canvas(certEl, { scale: 2, useCORS: true, backgroundColor: "#fbf3e3" });
          const imgData = canvas.toDataURL("image/png");
          const { jsPDF } = window.jspdf;
          const pdf = new jsPDF({ orientation: "landscape", unit: "px", format: [canvas.width / 2, canvas.height / 2] });
          pdf.addImage(imgData, "PNG", 0, 0, canvas.width / 2, canvas.height / 2);
          pdf.save("сертификат-рукия.pdf");
        } catch (e) { console.error(e); alert("Не удалось создать PDF — попробуйте ещё раз."); }
        btn.disabled = false; btn.textContent = "Скачать PDF";
      });
    });
  </script>
</body>
</html>
