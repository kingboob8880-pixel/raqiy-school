<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 64 64%27%3E%3Ccircle cx=%2732%27 cy=%2732%27 r=%2732%27 fill=%27%23b0842c%27/%3E%3Ctext x=%2732%27 y=%2745%27 font-size=%2734%27 text-anchor=%27middle%27 fill=%27white%27 font-family=%27serif%27%3E%D8%B4%3C/text%3E%3C/svg%3E">
<title>Тесты и экзамены — Онлайн-школа рукии</title>
<link rel="stylesheet" href="../../design/tokens.css?v=14">
<link rel="stylesheet" href="../../design/base.css?v=38">
</head>
<body data-zone="learn">
  <div id="site-header"></div>
  <main class="container">
    <h1>Тесты и экзамены</h1>
    <p class="form-note">Экзамен по каждой прочитанной книге — короткий, сразу после чтения (порог 70%). Итоговый тест — по всему модулю целиком.</p>
    <div id="tests-summary" hidden></div>
    <div id="tests-root" class="skeleton-loading">Загрузка…</div>
  </main>
  <div id="site-footer"></div>

  <script type="module">
    import { renderHeader, renderFooter } from "../js/layout.js?v=12";
    import { MODULES, bookKey } from "../js/modules-data.js?v=16";
    import { watchAuth, getStudentProfile } from "../../integration/auth.js?v=8";
    import { withBase } from "../js/base-path.js?v=6";

    renderHeader("learn");
    renderFooter();

    function statusBadge(state) {
      if (state?.status === "done") return `<span class="badge badge-passed">✓ ${Math.round(state.quizScore * 100)}%</span>`;
      if (state?.status === "in_progress") return `<span class="badge badge-pending">Не сдано — ${Math.round(state.quizScore * 100)}%</span>`;
      return `<span class="badge badge-pending">Не пройден</span>`;
    }

    // Сводка сдачи вверху страницы — раньше было видно только по одной
    // карточке модуля за раз, не было ни одной цифры "сколько всего уже
    // сдано" (запрос "сделай тесты и экзамен лучше и красивее", 2026-07-20).
    // "Прогресс виден = в 3.5 раза выше завершаемость" — тот же вывод, что
    // уже применялся к прогресс-бару кабинета (course-improvement-plan.md).
    function computeTestStats(progress) {
      let total = 0, passed = 0, scoreSum = 0, scoreCount = 0;
      MODULES.forEach((m) => {
        m.lessons.forEach((l) => {
          if (!l.exam) return;
          total++;
          const state = progress?.books?.[bookKey(l.doc)];
          if (state?.status === "done") { passed++; scoreSum += state.quizScore; scoreCount++; }
        });
        total++;
        const state = progress?.[m.id];
        if (state?.status === "done") { passed++; scoreSum += state.quizScore; scoreCount++; }
      });
      return { total, passed, avg: scoreCount ? Math.round((scoreSum / scoreCount) * 100) : null };
    }

    function renderSummary(progress) {
      const el = document.getElementById("tests-summary");
      if (!progress) { el.hidden = true; return; }
      const { total, passed, avg } = computeTestStats(progress);
      const percent = total ? Math.round((passed / total) * 100) : 0;
      el.hidden = false;
      el.innerHTML = `
        <div class="card" style="margin-bottom: var(--rp-space-5);">
          <div style="display:flex; justify-content:space-between; align-items:baseline; gap: var(--rp-space-3); flex-wrap:wrap;">
            <p style="margin:0; font-family: var(--rp-font-heading); font-size: var(--rp-fs-lg);">Сдано ${passed} из ${total}</p>
            ${avg !== null ? `<p class="form-note" style="margin:0;">Средний балл по сданным — ${avg}%</p>` : ""}
          </div>
          <div class="quiz-progress" style="margin-top: var(--rp-space-3); margin-bottom:0;" role="progressbar" aria-valuenow="${percent}" aria-valuemin="0" aria-valuemax="100">
            <div class="quiz-progress__bar" style="width:${percent}%"></div>
          </div>
        </div>`;
    }

    function render(progress) {
      renderSummary(progress);
      const root = document.getElementById("tests-root");
      root.innerHTML = MODULES.map((m) => {
        const bookRows = m.lessons.filter((l) => l.exam).map((l) => `
          <li><a class="test-item" href="${withBase("/pages/quiz/index.html")}?exam=${encodeURIComponent(l.exam)}">
            <span>${l.title}</span>${statusBadge(progress?.books?.[bookKey(l.doc)])}
          </a></li>`).join("");

        return `
          <div class="card" style="margin-bottom: var(--rp-space-5);">
            <p class="form-note" style="margin-bottom: 0.2rem;">Модуль ${m.id} · ${m.level}</p>
            <h2 style="margin-bottom: var(--rp-space-3);">${m.title}</h2>
            ${bookRows ? `<ul class="test-list">${bookRows}</ul>` : `<p class="form-note">Отдельных экзаменов по книгам здесь нет — только итоговый тест ниже.</p>`}
            <a class="test-item test-item--module" href="${withBase("/pages/quiz/index.html")}?module=${m.id}">
              <span>Итоговый тест по модулю</span>${statusBadge(progress?.[m.id])}
            </a>
          </div>`;
      }).join("");
    }

    watchAuth(async (user) => {
      if (!user) { render(null); return; }
      const profile = await getStudentProfile(user.uid);
      render(profile?.progress);
    });
  </script>
</body>
</html>
