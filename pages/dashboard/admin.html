<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 64 64%27%3E%3Ccircle cx=%2732%27 cy=%2732%27 r=%2732%27 fill=%27%23b0842c%27/%3E%3Ctext x=%2732%27 y=%2745%27 font-size=%2734%27 text-anchor=%27middle%27 fill=%27white%27 font-family=%27serif%27%3E%D8%B4%3C/text%3E%3C/svg%3E">
<title>Кабинет админа — Онлайн-школа рукии</title>
<link rel="stylesheet" href="../../design/tokens.css?v=15">
<link rel="stylesheet" href="../../design/base.css?v=38">
<style>
  .toggle { display: inline-flex; align-items: center; gap: 0.4rem; cursor: pointer; }
  .silent-flag { color: var(--rp-status-danger); font-weight: 700; }
</style>
</head>
<body data-zone="admin">
  <div id="site-header"></div>
  <main class="container">
    <div id="gate" class="skeleton-loading">Проверка входа…</div>
    <div id="dashboard" hidden>
      <div class="dash-hero">
        <div class="avatar">ش</div>
        <div>
          <p class="dash-hero__eyebrow">Онлайн-школа рукии</p>
          <h1>Кабинет администратора</h1>
        </div>
      </div>

      <div class="stat-grid" style="margin-bottom: var(--rp-space-6);">
        <div class="card stat-card"><div class="stat-card__value" id="stat-total">—</div><div class="stat-card__label">Всего учеников</div></div>
        <div class="card stat-card"><div class="stat-card__value" id="stat-paid">—</div><div class="stat-card__label">Оплатили</div></div>
        <div class="card stat-card"><div class="stat-card__value" id="stat-silent">—</div><div class="stat-card__label">Молчат &gt;14 дней</div></div>
      </div>

      <div class="card" style="margin-bottom: var(--rp-space-5);">
        <h3>Массовая рассылка</h3>
        <form id="broadcast-form" class="form-inline">
          <input type="text" id="broadcast-text" class="text-input" aria-label="Текст рассылки всем ученикам" placeholder="Сообщение всем ученикам…">
          <button class="btn btn-primary btn-sm" type="submit">Отправить всем</button>
        </form>
      </div>

      <h2>Ученики</h2>
      <div class="admin-toolbar">
        <input type="search" id="student-search" aria-label="Поиск ученика по имени или email" placeholder="Поиск по имени или email…">
        <select id="student-filter" aria-label="Фильтр списка учеников">
          <option value="all">Все ученики</option>
          <option value="paid">Оплатили</option>
          <option value="unpaid">Не оплатили</option>
          <option value="silent">Молчат &gt;14 дней</option>
        </select>
      </div>
      <div class="card" style="padding: 0; overflow: hidden;">
        <div class="table-scroll">
          <table class="data-table">
            <thead>
              <tr><th>Имя</th><th>Email</th><th>Прогресс</th><th>Балл</th><th>Молчит</th><th>Оплачено</th><th></th></tr>
            </thead>
            <tbody id="students-body">
              <tr><td colspan="7" class="form-note">Загрузка…</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <button id="logout-btn" class="btn btn-outline btn-sm" style="margin-top: var(--rp-space-6);">Выйти</button>
    </div>
  </main>
  <div id="site-footer"></div>

  <script type="module">
    import { renderHeader, renderFooter, showToast } from "../js/layout.js?v=12";
    import { watchAuth, isAdmin, logout } from "../../integration/auth.js?v=8";
    import {
      listStudents, setStudentPaid, deleteStudent, sendMessage, watchMessages, markThreadRead,
      countUnreadFromStudent, daysSince, computeOverallProgress, computeAverageScore,
    } from "../../integration/firestore.js?v=13";
    import { renderMessages, wireChatForm, scrollToBottom } from "../js/chat-ui.js?v=1";

    renderHeader("admin");
    renderFooter();

    const gate = document.getElementById("gate");
    const dashboard = document.getElementById("dashboard");
    const body = document.getElementById("students-body");
    let allStudents = [];
    let openThreadUid = null;
    let unreadMap = {}; // uid -> кол-во непрочитанных сообщений ОТ ученика (значок 💬)
    let activeThreadUid = null;
    let unwatchThread = null;

    function escapeHtml(s) {
      return String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }

    function studentRowHtml(s) {
      const silent = daysSince(s.lastSeenAt);
      const isSilent = silent !== null && silent > 14;
      const avg = computeAverageScore(s.progress);
      const isOpen = openThreadUid === s.uid;
      const name = escapeHtml(s.name || "—");
      const email = escapeHtml(s.email || "—");
      const nameAttr = escapeHtml(s.name || s.email || "ученика");
      // Значок непрочитанных — раньше единственный способ узнать, что ученик
      // написал, был открыть переписку каждого ученика по очереди (улучшение
      // чата, 2026-07-20).
      const unread = unreadMap[s.uid] || 0;
      const badgeHtml = unread ? `<span class="unread-badge">${unread > 9 ? "9+" : unread}</span>` : "";
      const row = `
        <tr>
          <td>${name}</td>
          <td>${email}</td>
          <td>${computeOverallProgress(s.progress)}%</td>
          <td>${avg === null ? "—" : avg + "%"}</td>
          <td class="${isSilent ? "silent-flag" : ""}">${silent === null ? "—" : silent + " дн."}</td>
          <td>
            <label class="toggle">
              <input type="checkbox" data-uid="${s.uid}" ${s.paid ? "checked" : ""}>
              <span class="status-pill ${s.paid ? "status-pill--paid" : "status-pill--unpaid"}">${s.paid ? "Оплачено" : "Не оплачено"}</span>
            </label>
          </td>
          <td>
            <div class="row-actions">
              <button type="button" class="thread-toggle ${isOpen ? "is-active" : ""}" data-uid="${s.uid}" title="Переписка" aria-label="Переписка с учеником">💬${badgeHtml}</button>
              <button type="button" class="student-delete is-danger" data-uid="${s.uid}" data-name="${nameAttr}" title="Удалить" aria-label="Удалить ученика">🗑</button>
            </div>
          </td>
        </tr>`;
      const thread = isOpen ? `
        <tr class="thread-row" data-thread-for="${s.uid}">
          <td colspan="7">
            <div class="thread-panel">
              <div class="msg-list" id="thread-msgs-${s.uid}" role="log" aria-live="polite"><p class="form-note">Загрузка…</p></div>
              <form class="thread-reply chat-form" data-uid="${s.uid}">
                <textarea class="chat-input" rows="1" aria-label="Ответ ученику ${escapeHtml(s.name || "")} (Enter — отправить, Shift+Enter — новая строка)" placeholder="Ответить ${escapeHtml(s.name || "ученику")}…"></textarea>
                <button class="btn btn-primary btn-sm" type="submit" disabled>Отправить</button>
              </form>
            </div>
          </td>
        </tr>` : "";
      return row + thread;
    }

    function updateUnreadBadge(uid, count) {
      unreadMap[uid] = count;
      const btn = body.querySelector(`.thread-toggle[data-uid="${uid}"]`);
      if (!btn) return;
      const existing = btn.querySelector(".unread-badge");
      if (count > 0) {
        const label = count > 9 ? "9+" : String(count);
        if (existing) existing.textContent = label;
        else btn.insertAdjacentHTML("beforeend", `<span class="unread-badge">${label}</span>`);
      } else if (existing) {
        existing.remove();
      }
    }

    // Живая переписка с открытым учеником (улучшение чата, 2026-07-20).
    // renderTable() каждый раз пересобирает всю таблицу через innerHTML —
    // это значит, что DOM-узел переписки от предыдущей подписки становится
    // "оторванным" при любом обновлении таблицы (смена фильтра, отметка
    // оплаты, удаление другого ученика), и старый слушатель Firestore тихо
    // обновлял бы невидимый узел, а видимый навсегда оставался бы на
    // "Загрузка…". Раньше переписка вообще не переоткрывалась в таких
    // случаях (сообщение читалось один раз через listMessages() при клике на
    // 💬). Поэтому синхронизация подписки вынесена в конец renderTable() и
    // всегда отписывается/переподписывается заново на актуальный узел.
    function stopThreadWatch() {
      if (unwatchThread) { unwatchThread(); unwatchThread = null; }
      activeThreadUid = null;
    }

    function startThreadWatch(uid) {
      stopThreadWatch();
      activeThreadUid = uid;
      const root = document.getElementById(`thread-msgs-${uid}`);
      if (!root) return;
      unwatchThread = watchMessages(uid, (msgs) => {
        renderMessages(root, msgs);
        scrollToBottom(root);
        markThreadRead(uid, "admin")
          .then(() => updateUnreadBadge(uid, 0))
          .catch((err) => console.warn(err));
      }, () => {
        root.innerHTML = `<p class="field-error">Не удалось загрузить переписку.</p>`;
      });
    }

    function matchesFilter(s, query, filter) {
      const q = query.trim().toLowerCase();
      if (q && !((s.name || "").toLowerCase().includes(q) || (s.email || "").toLowerCase().includes(q))) return false;
      if (filter === "paid") return !!s.paid;
      if (filter === "unpaid") return !s.paid;
      if (filter === "silent") { const d = daysSince(s.lastSeenAt); return d !== null && d > 14; }
      return true;
    }

    function renderTable() {
      const query = document.getElementById("student-search").value;
      const filter = document.getElementById("student-filter").value;
      const filtered = allStudents.filter((s) => matchesFilter(s, query, filter));

      body.innerHTML = filtered.map(studentRowHtml).join("")
        || `<tr><td colspan="7" class="form-note">Ничего не найдено.</td></tr>`;

      body.querySelectorAll('input[type="checkbox"]').forEach((cb) => {
        cb.addEventListener("change", async () => {
          await setStudentPaid(cb.dataset.uid, cb.checked);
          await refreshStudents();
          showToast(cb.checked ? "Отмечено как оплачено" : "Отмечено как не оплачено");
        });
      });

      body.querySelectorAll(".thread-toggle").forEach((btn) => {
        btn.addEventListener("click", () => {
          openThreadUid = openThreadUid === btn.dataset.uid ? null : btn.dataset.uid;
          renderTable();
        });
      });

      body.querySelectorAll(".student-delete").forEach((btn) => {
        btn.addEventListener("click", async () => {
          if (!confirm(`Удалить запись ${btn.dataset.name} из школы? Прогресс и переписка будут потеряны безвозвратно. Учётная запись входа (email/пароль) при этом не удаляется — если человек снова войдёт, для него откроется чистый неоплаченный кабинет.`)) return;
          await deleteStudent(btn.dataset.uid);
          if (openThreadUid === btn.dataset.uid) openThreadUid = null;
          await refreshStudents();
          showToast(`Запись ${btn.dataset.name} удалена`);
        });
      });

      body.querySelectorAll(".thread-reply").forEach((form) => {
        wireChatForm(form, form.querySelector("textarea"), async (text) => {
          await sendMessage(form.dataset.uid, "admin", text);
          showToast("Ответ отправлен");
        });
      });

      if (openThreadUid) startThreadWatch(openThreadUid);
      else stopThreadWatch();
    }

    async function refreshStudents() {
      try {
        allStudents = await listStudents();
      } catch (err) {
        console.warn(err);
        body.innerHTML = `<tr><td colspan="7" class="field-error">Не удалось загрузить список учеников. <button id="students-retry" class="btn btn-outline btn-sm" type="button">Повторить</button></td></tr>`;
        document.getElementById("students-retry").addEventListener("click", refreshStudents);
        return;
      }
      document.getElementById("stat-total").textContent = allStudents.length;
      document.getElementById("stat-paid").textContent = allStudents.filter((s) => s.paid).length;
      document.getElementById("stat-silent").textContent = allStudents.filter((s) => {
        const d = daysSince(s.lastSeenAt);
        return d !== null && d > 14;
      }).length;

      // Значки непрочитанных на 💬 — считаем отдельным агрегирующим запросом
      // на ученика (getCountFromServer, без загрузки тел сообщений), чтобы
      // не открывать каждую переписку вручную, чтобы понять, кто написал
      // (улучшение чата, 2026-07-20). Открытый сейчас тред всегда учтён
      // (startThreadWatch сам обнулит его значок после markThreadRead).
      try {
        const counts = await Promise.all(allStudents.map((s) => countUnreadFromStudent(s.uid)));
        unreadMap = Object.fromEntries(allStudents.map((s, i) => [s.uid, counts[i]]));
      } catch (err) {
        console.warn(err);
      }

      renderTable();
    }

    watchAuth(async (user) => {
      if (!user) { location.href = "../auth/login.html"; return; }
      // Без try/catch тут провал isAdmin() (обрыв сети) навсегда оставлял
      // экран на "Проверка входа…" без объяснения (план улучшения курса,
      // 2026-07-18, пятый проход).
      let admin;
      try {
        admin = await isAdmin(user.uid);
      } catch (err) {
        console.warn(err);
        gate.innerHTML = `
          <p class="field-error">Не удалось проверить права доступа — проверьте связь с интернетом.</p>
          <button id="gate-retry" class="btn btn-outline btn-sm" type="button">Повторить</button>`;
        document.getElementById("gate-retry").addEventListener("click", () => location.reload());
        return;
      }
      if (!admin) {
        location.href = "student.html";
        return;
      }
      gate.hidden = true;
      dashboard.hidden = false;
      await refreshStudents();

      document.getElementById("student-search").addEventListener("input", renderTable);
      document.getElementById("student-filter").addEventListener("change", renderTable);

      document.getElementById("broadcast-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const input = document.getElementById("broadcast-text");
        const text = input.value.trim();
        if (!text) return;
        if (!confirm(`Отправить это сообщение всем ученикам (${allStudents.length})?`)) return;
        await Promise.all(allStudents.map((s) => sendMessage(s.uid, "admin", text)));
        input.value = "";
        showToast("Отправлено " + allStudents.length + " ученикам");
      });

      document.getElementById("logout-btn").addEventListener("click", async () => {
        stopThreadWatch();
        await logout();
        location.href = "../index.html";
      });
    });
  </script>
</body>
</html>
