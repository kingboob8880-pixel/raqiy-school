<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Регистрация — Онлайн-школа рукии</title>
<link rel="stylesheet" href="../../design/tokens.css?v=6">
<link rel="stylesheet" href="../../design/base.css?v=12">
<style>
  .auth-wrap { max-width: 26rem; margin: var(--rp-space-7) auto; padding-inline: var(--rp-space-4); }
</style>
</head>
<body data-zone="learn">
  <div id="site-header"></div>
  <main class="auth-wrap">
    <div class="card">
      <h1>Регистрация</h1>
      <p class="form-note">Сразу открыты бесплатные ознакомительные отрывки книг.
        Полный курс (30 000 ₽) — после оплаты в личке (t.me/ruqoq) и подтверждения администратором.</p>
      <form id="register-form">
        <div class="field">
          <label for="name">Имя</label>
          <input type="text" id="name" required autocomplete="name">
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email">
        </div>
        <div class="field">
          <label for="password">Пароль</label>
          <input type="password" id="password" required minlength="6" autocomplete="new-password">
        </div>
        <p id="form-error" class="field-error" hidden></p>
        <button type="submit" class="btn btn-primary btn-block">Зарегистрироваться</button>
      </form>
      <p class="form-note" style="margin-top: var(--rp-space-4);">Уже есть аккаунт? <a href="login.html">Войти</a></p>
    </div>
  </main>
  <div id="site-footer"></div>

  <script type="module">
    import { renderHeader, renderFooter } from "../js/layout.js?v=7";
    import { registerStudent } from "../../integration/auth.js?v=6";
    renderHeader("learn");
    renderFooter();

    const form = document.getElementById("register-form");
    const errorEl = document.getElementById("form-error");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorEl.hidden = true;
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      try {
        await registerStudent({ name, email, password });
        location.href = "../dashboard/student.html";
      } catch (err) {
        errorEl.textContent = "Не удалось зарегистрироваться: " + (err.message || err);
        errorEl.hidden = false;
      }
    });
  </script>
</body>
</html>
