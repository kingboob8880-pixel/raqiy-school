<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 64 64%27%3E%3Ccircle cx=%2732%27 cy=%2732%27 r=%2732%27 fill=%27%23b0842c%27/%3E%3Ctext x=%2732%27 y=%2745%27 font-size=%2734%27 text-anchor=%27middle%27 fill=%27white%27 font-family=%27serif%27%3E%D8%B4%3C/text%3E%3C/svg%3E">
<title>Регистрация — Онлайн-школа рукии</title>
<link rel="stylesheet" href="../../design/tokens.css?v=13">
<link rel="stylesheet" href="../../design/base.css?v=38">
<style>
  .auth-wrap { max-width: 26rem; margin: var(--rp-space-7) auto; padding-inline: var(--rp-space-4); }
</style>
</head>
<body data-zone="learn">
  <div id="site-header"></div>
  <main class="auth-wrap">
    <div class="card">
      <h1>Регистрация</h1>
      <p class="form-note">Сразу открыты бесплатные ознакомительные отрывки книг.
        Полный курс (30 000 ₽) — после оплаты в личке (t.me/ruqoq) и подтверждения администратором.</p>
      <form id="register-form">
        <div class="field">
          <label for="name">Имя</label>
          <input type="text" id="name" required autocomplete="name">
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email">
        </div>
        <div class="field">
          <label for="password">Пароль</label>
          <div class="password-field">
            <input type="password" id="password" required minlength="6" autocomplete="new-password" aria-describedby="password-hint">
            <button type="button" id="password-toggle" class="password-toggle" aria-label="Показать пароль" aria-pressed="false">👁</button>
          </div>
          <p id="password-hint" class="form-note">Минимум 6 символов.</p>
        </div>
        <p id="form-error" class="field-error" role="alert" hidden></p>
        <button id="submit-btn" type="submit" class="btn btn-primary btn-block">Зарегистрироваться</button>
      </form>
      <p class="form-note" style="margin-top: var(--rp-space-4);">Уже есть аккаунт? <a href="login.html">Войти</a></p>
    </div>
  </main>
  <div id="site-footer"></div>

  <script type="module">
    import { renderHeader, renderFooter } from "../js/layout.js?v=12";
    import { registerStudent, friendlyAuthError } from "../../integration/auth.js?v=8";
    renderHeader("learn");
    renderFooter();

    const form = document.getElementById("register-form");
    const errorEl = document.getElementById("form-error");
    const submitBtn = document.getElementById("submit-btn");

    const passwordInput = document.getElementById("password");
    const passwordToggle = document.getElementById("password-toggle");
    passwordToggle.addEventListener("click", () => {
      const showing = passwordInput.type === "text";
      passwordInput.type = showing ? "password" : "text";
      passwordToggle.setAttribute("aria-pressed", String(!showing));
      passwordToggle.setAttribute("aria-label", showing ? "Показать пароль" : "Скрыть пароль");
      passwordToggle.textContent = showing ? "👁" : "🙈";
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorEl.hidden = true;
      submitBtn.disabled = true;
      submitBtn.textContent = "Регистрация…";
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      try {
        await registerStudent({ name, email, password });
        location.href = "../dashboard/student.html";
      } catch (err) {
        errorEl.textContent = friendlyAuthError(err);
        errorEl.hidden = false;
        submitBtn.disabled = false;
        submitBtn.textContent = "Зарегистрироваться";
      }
    });
  </script>
</body>
</html>
