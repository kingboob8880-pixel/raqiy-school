<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Вход — Онлайн-школа рукии</title>
<link rel="stylesheet" href="../../design/tokens.css?v=6">
<link rel="stylesheet" href="../../design/base.css?v=8">
<style>
  .auth-wrap { max-width: 26rem; margin: var(--rp-space-7) auto; padding-inline: var(--rp-space-4); }
</style>
</head>
<body data-zone="learn">
  <div id="site-header"></div>
  <main class="auth-wrap">
    <div class="card">
      <h1>Вход</h1>
      <p class="form-note">Один экран входа для учеников и администратора — роль
        определяется автоматически после входа.</p>
      <form id="login-form">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email">
        </div>
        <div class="field">
          <label for="password">Пароль</label>
          <input type="password" id="password" required autocomplete="current-password">
        </div>
        <p id="form-error" class="field-error" hidden></p>
        <button type="submit" class="btn btn-primary btn-block">Войти</button>
      </form>
      <p class="form-note" style="margin-top: var(--rp-space-4);">Нет аккаунта? <a href="register.html">Зарегистрироваться</a></p>
    </div>
  </main>
  <div id="site-footer"></div>

  <script type="module">
    import { renderHeader, renderFooter } from "../js/layout.js?v=6";
    import { loginWithEmail, resolveRole } from "../../integration/auth.js?v=6";
    renderHeader("learn");
    renderFooter();

    const form = document.getElementById("login-form");
    const errorEl = document.getElementById("form-error");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorEl.hidden = true;
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      try {
        const user = await loginWithEmail(email, password);
        const role = await resolveRole(user);
        location.href = role === "admin"
          ? "../dashboard/admin.html"
          : "../dashboard/student.html";
      } catch (err) {
        errorEl.textContent = "Не удалось войти: " + (err.message || err);
        errorEl.hidden = false;
      }
    });
  </script>
</body>
</html>
