<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 64 64%27%3E%3Ccircle cx=%2732%27 cy=%2732%27 r=%2732%27 fill=%27%23b0842c%27/%3E%3Ctext x=%2732%27 y=%2745%27 font-size=%2734%27 text-anchor=%27middle%27 fill=%27white%27 font-family=%27serif%27%3E%D8%B4%3C/text%3E%3C/svg%3E">
<title>Вход — Онлайн-школа рукии</title>
<link rel="stylesheet" href="../../design/tokens.css?v=10">
<link rel="stylesheet" href="../../design/base.css?v=21">
<style>
  .auth-wrap { max-width: 26rem; margin: var(--rp-space-7) auto; padding-inline: var(--rp-space-4); }
</style>
</head>
<body data-zone="learn">
  <div id="site-header"></div>
  <main class="auth-wrap">
    <div class="card">
      <h1>Вход</h1>
      <p class="form-note">Один экран входа для учеников и администратора — роль
        определяется автоматически после входа.</p>
      <form id="login-form">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email">
        </div>
        <div class="field">
          <label for="password">Пароль</label>
          <div class="password-field">
            <input type="password" id="password" required autocomplete="current-password">
            <button type="button" id="password-toggle" class="password-toggle" aria-label="Показать пароль" aria-pressed="false">👁</button>
          </div>
        </div>
        <p id="form-error" class="field-error" role="alert" hidden></p>
        <button id="submit-btn" type="submit" class="btn btn-primary btn-block">Войти</button>
      </form>
      <p class="form-note" style="margin-top: var(--rp-space-4);">Нет аккаунта? <a href="register.html">Зарегистрироваться</a></p>
    </div>
  </main>
  <div id="site-footer"></div>

  <script type="module">
    import { renderHeader, renderFooter } from "../js/layout.js?v=11";
    import { loginWithEmail, resolveRole, friendlyAuthError } from "../../integration/auth.js?v=8";
    renderHeader("learn");
    renderFooter();

    const form = document.getElementById("login-form");
    const errorEl = document.getElementById("form-error");
    const submitBtn = document.getElementById("submit-btn");

    const passwordInput = document.getElementById("password");
    const passwordToggle = document.getElementById("password-toggle");
    passwordToggle.addEventListener("click", () => {
      const showing = passwordInput.type === "text";
      passwordInput.type = showing ? "password" : "text";
      passwordToggle.setAttribute("aria-pressed", String(!showing));
      passwordToggle.setAttribute("aria-label", showing ? "Показать пароль" : "Скрыть пароль");
      passwordToggle.textContent = showing ? "👁" : "🙈";
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorEl.hidden = true;
      submitBtn.disabled = true;
      submitBtn.textContent = "Вход…";
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      try {
        const user = await loginWithEmail(email, password);
        const role = await resolveRole(user);
        location.href = role === "admin"
          ? "../dashboard/admin.html"
          : "../dashboard/student.html";
      } catch (err) {
        errorEl.textContent = friendlyAuthError(err);
        errorEl.hidden = false;
        submitBtn.disabled = false;
        submitBtn.textContent = "Войти";
      }
    });
  </script>
</body>
</html>
