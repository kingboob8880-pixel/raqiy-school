<!DOCTYPE html>
<html lang="ru">
<head>
<script>document.write('<base href="' + (location.hostname.endsWith('github.io') ? '/' + (location.pathname.split('/')[1] || '') + '/' : '/') + '">');</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Модуль — Онлайн-школа рукии</title>
<link rel="stylesheet" href="./design/tokens.css">
<link rel="stylesheet" href="./design/base.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  .doc-body table { width: 100%; border-collapse: collapse; margin: var(--rp-space-4) 0; }
  .doc-body th, .doc-body td { border: 1px solid var(--rp-learn-border); padding: var(--rp-space-2) var(--rp-space-3); text-align: left; font-size: var(--rp-fs-sm); }
  .doc-body th { background: var(--rp-color-parchment-200); }
  .lesson-list { list-style: none; margin: 0; padding: 0; }
  .lesson-list li { margin-bottom: var(--rp-space-3); }
  .lesson-link { display: flex; align-items: center; justify-content: space-between; gap: var(--rp-space-3);
    padding: var(--rp-space-4); border-radius: var(--rp-radius-md); border: 1px solid var(--rp-learn-border);
    background: var(--rp-learn-surface); text-decoration: none; color: inherit; }
  .lesson-link:hover { background: var(--rp-color-parchment-200); }
</style>
</head>
<body data-zone="learn">
  <div id="site-header"></div>
  <main class="container" style="padding-block: var(--rp-space-6);">
    <a href="./pages/modules/index.html" class="btn btn-ghost btn-sm">← Все модули</a>
    <div id="module-root" class="skeleton-loading">Загрузка…</div>
  </main>
  <div id="site-footer"></div>

  <script type="module">
    import { renderHeader, renderFooter } from "./pages/js/layout.js";
    import { getModule } from "./pages/js/modules-data.js";
    import { loadMarkdownDoc, statusBadgeHtml } from "./pages/js/markdown-loader.js";

    renderHeader("learn");
    renderFooter();

    const params = new URLSearchParams(location.search);
    const id = params.get("id");
    const mod = getModule(id);
    const root = document.getElementById("module-root");

    if (!mod) {
      root.innerHTML = "<p>Модуль не найден.</p>";
    } else {
      document.title = `Модуль ${mod.id}. ${mod.title} — Онлайн-школа рукии`;
      const lessonsHtml = mod.lessons.length
        ? `<ul class="lesson-list">${mod.lessons.map((l) => `
            <li><a class="lesson-link" href="./pages/book.html?doc=${encodeURIComponent(l.doc)}">
              <span>${l.title}</span><span aria-hidden="true">→</span>
            </a></li>`).join("")}</ul>`
        : `<p class="form-note">Отдельных уроков-первоисточников нет — весь текст модуля на его собственной странице ниже.</p>`;

      root.innerHTML = `
        <div class="card" style="margin-bottom: var(--rp-space-5);">
          <p class="form-note">Модуль ${mod.id} · ${mod.level}</p>
          <h1>${mod.title}</h1>
          ${statusBadgeHtml(mod.status)}
          ${mod.intro_video ? `<video controls preload="none" style="margin-top: var(--rp-space-4); border-radius: var(--rp-radius-md);" src="${mod.intro_video}"></video>` : ""}
        </div>
        <h2>Уроки</h2>
        ${lessonsHtml}
        <h2 style="margin-top: var(--rp-space-6);">Текст модуля</h2>
        <div id="module-doc" class="card skeleton-loading">Загрузка…</div>
        <div style="margin-top: var(--rp-space-6);">
          <a class="btn btn-primary" href="./pages/quiz/index.html?module=${mod.id}">Пройти тест по модулю →</a>
        </div>
      `;

      loadMarkdownDoc(mod.doc).then((doc) => {
        import("./pages/js/markdown-loader.js").then(({ renderDocInto }) => {
          renderDocInto(document.getElementById("module-doc"), doc, { showTitle: false });
        });
      }).catch((err) => {
        document.getElementById("module-doc").innerHTML = `<p class="field-error">${err.message}</p>`;
      });
    }
  </script>
</body>
</html>
