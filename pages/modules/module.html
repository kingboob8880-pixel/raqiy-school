<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 64 64%27%3E%3Ccircle cx=%2732%27 cy=%2732%27 r=%2732%27 fill=%27%23b0842c%27/%3E%3Ctext x=%2732%27 y=%2745%27 font-size=%2734%27 text-anchor=%27middle%27 fill=%27white%27 font-family=%27serif%27%3E%D8%B4%3C/text%3E%3C/svg%3E">
<title>Модуль — Онлайн-школа рукии</title>
<link rel="stylesheet" href="../../design/tokens.css?v=20">
<link rel="stylesheet" href="../../design/base.css?v=50">
<script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js" defer></script>
<!-- Общие стили текста урока (.doc-body) и списка "Уроки" (.lesson-list/
     .lesson-link) теперь в design/base.css — раньше дублировались/жили
     локально здесь, редизайн "красиво и интересно" переехал в общий файл
     (2026-07-21, см. project.md). -->
</head>
<body data-zone="learn">
  <noscript><p style="text-align:center;padding:2rem;">Для работы сайта необходим JavaScript. Пожалуйста, включите его в настройках браузера.</p></noscript>
  <div id="site-header"></div>
  <main class="container">
    <a href="index.html" class="btn btn-ghost btn-sm">← Все модули</a>
    <div id="module-root" class="skeleton-loading">Загрузка…</div>
  </main>
  <div id="site-footer"></div>

  <script type="module">
    import { renderHeader, renderFooter } from "../js/layout.js?v=16";
    import { getModule, bookKey, isModuleUnlocked } from "../js/modules-data.js?v=34";
    import { loadMarkdownDoc, statusBadgeHtml, renderDocInto, applyPaywall, applyRegisterWall, setupSelfCheck, enhanceDuaBlocks, enhanceContentLinks, addReadingAids, staggerReveal } from "../js/markdown-loader.js?v=23";
    import { t, getLang, moduleTitle, lessonTitle, localLevel } from "../js/i18n.js?v=5";
    import { ASSIGNMENTS } from "../js/assignments-data.js?v=1";
    import { withBase } from "../js/base-path.js?v=6";
    import { watchAuth, getStudentProfile, isAdmin } from "../../integration/auth.js?v=9";
    import { getFullBookContent, saveUnderstanding } from "../../integration/firestore.js?v=19";

    renderHeader("learn");
    renderFooter();
    document.documentElement.lang = getLang();

    const params = new URLSearchParams(location.search);
    const id = params.get("id");
    const mod = getModule(id);
    const root = document.getElementById("module-root");

    // Редизайн "красиво и интересно" (запрос автора, скриншот списка
    // "Уроки", 2026-07-21): нумерованный маркер-кружок (тот же язык, что у
    // .path-step/.doc-toc), мета-текст экзамена — теперь бейдж-пилюля, а не
    // приглушённая строка. Разметка — design/base.css (.lesson-list/.lesson-link).
    function lessonMetaHtml(l, progress) {
      const hasQuiz = !!l.exam;
      const done = progress?.books?.[bookKey(l.doc)]?.status === "done";
      if (done) return `<span class="lesson-link__meta">${t("lesson.done")}</span>`;
      if (hasQuiz) return `<span class="lesson-link__meta">${t("lesson.exam")}</span>`;
      return "";
    }

    function lessonLinkHtml(l, i, progress) {
      const done = progress?.books?.[bookKey(l.doc)]?.status === "done";
      return `
        <li><a class="lesson-link${done ? " lesson-link--done" : ""}" href="../book.html?doc=${encodeURIComponent(l.doc)}">
          <span class="lesson-link__marker" aria-hidden="true">${i + 1}</span>
          <span class="lesson-link__body">
            <span class="lesson-link__text">
              <span class="lesson-link__title">${lessonTitle(l)}</span>
              ${lessonMetaHtml(l, progress)}
            </span>
          </span>
          <span class="lesson-link__go" aria-hidden="true">→</span>
        </a></li>`;
    }

    function renderLessons(progress) {
      const list = document.getElementById("lesson-list");
      if (!list) return;
      list.innerHTML = mod.lessons.map((l, i) => lessonLinkHtml(l, i, progress)).join("");
      // Та же лёгкая stagger-анимация появления, что у оглавления книги
      // (markdown-loader.js) — переиспользуем общую утилиту вместо третьей
      // копии IntersectionObserver-кода.
      staggerReveal(Array.from(list.querySelectorAll("li")), { step: 45, max: 350 });
    }

    const ASSIGN_ICONS = { reflection: "\u{1F4DD}", practice: "\u{1F3CB}️", daily: "\u{1F4C5}" };

    function renderAssignments() {
      const section = document.getElementById("assignments-section");
      if (!section) return;
      const items = ASSIGNMENTS[mod.id];
      if (!items || !items.length) return;
      section.innerHTML = `
        <h2 style="text-align:left;">${t("module.assignments")}</h2>
        <div class="assignments-grid">${items.map((a) => `
          <div class="card lift assignment-card">
            <div class="assignment-card__header">
              <span class="assignment-card__icon">${ASSIGN_ICONS[a.type] || "\u{1F4DD}"}</span>
              <span class="assignment-card__type">${t("assign." + a.type)}</span>
              <span class="assignment-card__duration">${t("assign.duration")}: ${a.duration}</span>
            </div>
            <h3 class="assignment-card__title">${a.title}</h3>
            <p class="assignment-card__desc">${a.description}</p>
          </div>`).join("")}
        </div>
      `;
      section.hidden = false;
      staggerReveal(Array.from(section.querySelectorAll(".assignment-card")), { step: 60, max: 400 });
    }

    if (!mod) {
      root.innerHTML = "<p>Модуль не найден.</p>";
    } else {
      document.title = `${t("module.n")} ${mod.id}. ${moduleTitle(mod)} — ${t("site.title")}`;
      const lessonsHtml = mod.lessons.length
        ? `<ol class="lesson-list" id="lesson-list">${mod.lessons.map((l, i) => lessonLinkHtml(l, i, null)).join("")}</ol>`
        : `<p class="form-note">${t("module.nolessons")}</p>`;

      root.innerHTML = `
        <div class="book-hero">
          ${mod.cover ? `<img class="book-hero__cover" src="${withBase(mod.cover)}" alt="" loading="lazy">` : ""}
          <div class="book-hero__spine"></div>
          <div class="book-hero__body">
            <p class="form-note">${t("module.n")} ${mod.id} · ${localLevel(mod.level)}</p>
            <h1>${moduleTitle(mod)}</h1>
            ${statusBadgeHtml(mod.status)}
            ${mod.intro_video ? `<video class="book-hero__video" controls preload="none" src="${withBase(mod.intro_video)}"></video>` : ""}
          </div>
        </div>
        <h2 style="text-align:left;">${t("module.lessons")}</h2>
        ${lessonsHtml}
        <h2 style="margin-top: var(--rp-space-6); text-align:left;">${t("module.text")}</h2>
        <div id="module-doc" class="card skeleton-loading">${t("common.loading")}</div>
        <div id="module-note" style="margin-top: var(--rp-space-4);"></div>
        <div id="quiz-cta" style="margin-top: var(--rp-space-6);" hidden>
          <a class="btn btn-primary" href="../quiz/index.html?module=${mod.id}">${t("module.quiz")}</a>
          ${mod.status !== "certified" ? `<p class="form-note" style="margin-top: var(--rp-space-2);">${t("module.notcert")}</p>` : ""}
        </div>
        <div id="assignments-section" style="margin-top: var(--rp-space-6);" hidden></div>
      `;

      // Тот же паввол, что на странице отдельного урока (book.html) — раньше
      // здесь его не было вообще, и текст модуля (у модулей без отдельных
      // уроков-книг это ВЕСЬ текст, не превью) отдавался анонимному гостю
      // целиком (независимая проверка, 2026-07-19).
      loadMarkdownDoc(mod.doc).then((doc) => {
        const docRoot = document.getElementById("module-doc");
        docRoot.classList.remove("skeleton-loading"); // иначе стиль скелетона
        // (центр/приглушённый цвет/мелкий шрифт) каскадом наследуется всем
        // реальным текстом модуля навсегда (независимая проверка, 2026-07-19).
        renderDocInto(docRoot, doc, { showTitle: false });
        const bodyEl = docRoot.querySelector(".doc-body");
        watchAuth(async (user) => {
          if (!user) {
            if (bodyEl) applyRegisterWall(bodyEl);
            return;
          }
          const [profile, admin] = await Promise.all([getStudentProfile(user.uid), isAdmin(user.uid)]);
          // Module lock check — students cannot access module N+1 until module N quiz is passed
          if (!admin && !isModuleUnlocked(mod.id, profile?.progress)) {
            root.innerHTML = `
              <div class="card" style="text-align:center; padding: var(--rp-space-6);">
                <p style="font-size:2rem;">🔒</p>
                <h2>${t("module.locked")}</h2>
                <p class="form-note">${t("module.lockedmsg")} ${mod.id - 1}</p>
                <a class="btn btn-primary" href="module.html?id=${mod.id - 1}" style="margin-top: var(--rp-space-4);">← ${t("module.n")} ${mod.id - 1}</a>
              </div>`;
            return;
          }
          const unlocked = admin || !!profile?.paid;
          if (bodyEl && !unlocked) applyPaywall(bodyEl);
          // Самопроверка — та же общая функция, что на book.html (js/markdown-loader.js).
          const noteRoot = document.getElementById("module-note");
          if (noteRoot) {
            setupSelfCheck(noteRoot, bodyEl, profile?.progress?.books?.[bookKey(mod.doc)]?.understanding,
              (u) => saveUnderstanding(user.uid, bookKey(mod.doc), u));
          }
          try {
            if (bodyEl && unlocked) {
              const full = await getFullBookContent(bookKey(mod.doc));
              if (full?.body) {
                bodyEl.innerHTML = window.marked ? window.marked.parse(full.body) : bodyEl.innerHTML;
                bodyEl.querySelectorAll("table").forEach((table) => {
                  const wrap = document.createElement("div");
                  wrap.className = "table-scroll";
                  table.replaceWith(wrap);
                  wrap.appendChild(table);
                });
                enhanceDuaBlocks(bodyEl);
                enhanceContentLinks(bodyEl);
              }
              addReadingAids(docRoot);
            }
          } catch (e) { console.warn("module content enrichment", e); }
          // Кнопка теста — показываем всегда когда есть доступ, даже если
          // выше произошла ошибка обогащения контента.
          if (unlocked) {
            document.getElementById("quiz-cta").hidden = false;
            renderAssignments();
          }
          if (mod.lessons.length) renderLessons(profile?.progress);
        });
      }).catch((err) => {
        document.getElementById("module-doc").innerHTML = `<p class="field-error">${err.message}</p>`;
      });
    }
  </script>
</body>
</html>
