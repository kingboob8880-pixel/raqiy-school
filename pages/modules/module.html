<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 64 64%27%3E%3Ccircle cx=%2732%27 cy=%2732%27 r=%2732%27 fill=%27%23b0842c%27/%3E%3Ctext x=%2732%27 y=%2745%27 font-size=%2734%27 text-anchor=%27middle%27 fill=%27white%27 font-family=%27serif%27%3E%D8%B4%3C/text%3E%3C/svg%3E">
<title>Модуль — Онлайн-школа рукии</title>
<link rel="stylesheet" href="../../design/tokens.css?v=10">
<link rel="stylesheet" href="../../design/base.css?v=27">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
<style>
  .doc-body table { width: 100%; border-collapse: collapse; margin: var(--rp-space-4) 0; }
  .doc-body th, .doc-body td { border: 1px solid var(--rp-learn-border); padding: var(--rp-space-2) var(--rp-space-3); text-align: left; font-size: var(--rp-fs-sm); }
  .doc-body th { background: var(--rp-color-parchment-200); }
  .doc-body blockquote { margin: var(--rp-space-5) 0; padding: var(--rp-space-4);
    border-left: 4px solid var(--rp-status-danger); background: color-mix(in srgb, var(--rp-status-danger) 10%, var(--rp-learn-surface));
    border-radius: 0 var(--rp-radius-sm) var(--rp-radius-sm) 0; }
  .doc-body blockquote p:last-child { margin-bottom: 0; }
  .lesson-list { list-style: none; margin: 0; padding: 0; }
  .lesson-list li { margin-bottom: var(--rp-space-3); }
  .lesson-link { display: flex; align-items: center; justify-content: space-between; gap: var(--rp-space-3);
    padding: var(--rp-space-4); border-radius: var(--rp-radius-md); border: 1px solid var(--rp-learn-border);
    background: var(--rp-learn-surface); text-decoration: none; color: inherit; }
  .lesson-link:hover { background: var(--rp-color-parchment-200); }
  .lesson-link__meta { display: block; font-size: var(--rp-fs-sm); color: var(--rp-learn-text-muted); margin-top: 0.2rem; }
</style>
</head>
<body data-zone="learn">
  <div id="site-header"></div>
  <main class="container">
    <a href="index.html" class="btn btn-ghost btn-sm">← Все модули</a>
    <div id="module-root" class="skeleton-loading">Загрузка…</div>
  </main>
  <div id="site-footer"></div>

  <script type="module">
    import { renderHeader, renderFooter } from "../js/layout.js?v=12";
    import { getModule, bookKey } from "../js/modules-data.js?v=14";
    import { loadMarkdownDoc, statusBadgeHtml, renderDocInto, applyPaywall, applyRegisterWall, setupNoteCard } from "../js/markdown-loader.js?v=10";
    import { withBase } from "../js/base-path.js?v=6";
    import { watchAuth, getStudentProfile, isAdmin } from "../../integration/auth.js?v=8";
    import { getFullBookContent, saveBookNote } from "../../integration/firestore.js?v=13";

    renderHeader("learn");
    renderFooter();

    const params = new URLSearchParams(location.search);
    const id = params.get("id");
    const mod = getModule(id);
    const root = document.getElementById("module-root");

    function lessonMetaHtml(l, progress) {
      const hasQuiz = !!l.exam;
      const done = progress?.books?.[bookKey(l.doc)]?.status === "done";
      if (done) return `<span class="lesson-link__meta">✓ Книга и тест пройдены</span>`;
      if (hasQuiz) return `<span class="lesson-link__meta">После чтения — экзамен по книге (порог 70%)</span>`;
      return "";
    }

    function renderLessons(progress) {
      const list = document.getElementById("lesson-list");
      if (!list) return;
      list.innerHTML = mod.lessons.map((l) => {
        const done = progress?.books?.[bookKey(l.doc)]?.status === "done";
        return `
          <li><a class="lesson-link" href="../book.html?doc=${encodeURIComponent(l.doc)}">
            <span>${done ? "✓ " : ""}${l.title}${lessonMetaHtml(l, progress)}</span>
            <span aria-hidden="true">→</span>
          </a></li>`;
      }).join("");
    }

    if (!mod) {
      root.innerHTML = "<p>Модуль не найден.</p>";
    } else {
      document.title = `Модуль ${mod.id}. ${mod.title} — Онлайн-школа рукии`;
      const lessonsHtml = mod.lessons.length
        ? `<ul class="lesson-list" id="lesson-list">${mod.lessons.map((l) => `
            <li><a class="lesson-link" href="../book.html?doc=${encodeURIComponent(l.doc)}">
              <span>${l.title}</span><span aria-hidden="true">→</span>
            </a></li>`).join("")}</ul>`
        : `<p class="form-note">Отдельных уроков-первоисточников нет — весь текст модуля на его собственной странице ниже.</p>`;

      root.innerHTML = `
        <div class="book-hero">
          ${mod.cover ? `<img class="book-hero__cover" src="${withBase(mod.cover)}" alt="" loading="lazy">` : ""}
          <div class="book-hero__spine"></div>
          <div class="book-hero__body">
            <p class="form-note">Модуль ${mod.id} · ${mod.level}</p>
            <h1>${mod.title}</h1>
            ${statusBadgeHtml(mod.status)}
            ${mod.intro_video ? `<video class="book-hero__video" controls preload="none" src="${withBase(mod.intro_video)}"></video>` : ""}
          </div>
        </div>
        <h2>Уроки</h2>
        ${lessonsHtml}
        <h2 style="margin-top: var(--rp-space-6);">Текст модуля</h2>
        <div id="module-doc" class="card skeleton-loading">Загрузка…</div>
        <div id="module-note" style="margin-top: var(--rp-space-4);"></div>
        <div id="quiz-cta" style="margin-top: var(--rp-space-6);" hidden>
          <a class="btn btn-primary" href="../quiz/index.html?module=${mod.id}">Пройти тест по модулю →</a>
          ${mod.status !== "certified" ? `<p class="form-note" style="margin-top: var(--rp-space-2);">Модуль ещё не подтверждён шейхом — тест можно пройти для практики, но материал может измениться.</p>` : ""}
        </div>
      `;

      // Тот же паввол, что на странице отдельного урока (book.html) — раньше
      // здесь его не было вообще, и текст модуля (у модулей без отдельных
      // уроков-книг это ВЕСЬ текст, не превью) отдавался анонимному гостю
      // целиком (независимая проверка, 2026-07-19).
      loadMarkdownDoc(mod.doc).then((doc) => {
        const docRoot = document.getElementById("module-doc");
        docRoot.classList.remove("skeleton-loading"); // иначе стиль скелетона
        // (центр/приглушённый цвет/мелкий шрифт) каскадом наследуется всем
        // реальным текстом модуля навсегда (независимая проверка, 2026-07-19).
        renderDocInto(docRoot, doc, { showTitle: false });
        const bodyEl = docRoot.querySelector(".doc-body");
        watchAuth(async (user) => {
          if (!user) {
            if (bodyEl) applyRegisterWall(bodyEl);
            return;
          }
          const [profile, admin] = await Promise.all([getStudentProfile(user.uid), isAdmin(user.uid)]);
          const unlocked = admin || !!profile?.paid;
          if (bodyEl && !unlocked) applyPaywall(bodyEl);
          // Заметки — та же общая функция, что на book.html (js/markdown-loader.js).
          const noteRoot = document.getElementById("module-note");
          if (noteRoot) {
            setupNoteCard(noteRoot, profile?.progress?.books?.[bookKey(mod.doc)]?.note,
              (text) => saveBookNote(user.uid, bookKey(mod.doc), text));
          }
          // Тот же переход на полный текст из Firestore, что на book.html
          // (project.md §18/§22, "закрыть дыру с платным контентом") — до
          // миграции конкретного docId getFullBookContent() вернёт null и
          // ничего не поменяется.
          if (bodyEl && unlocked) {
            const full = await getFullBookContent(bookKey(mod.doc));
            if (full?.body) {
              bodyEl.innerHTML = window.marked ? window.marked.parse(full.body) : bodyEl.innerHTML;
              bodyEl.querySelectorAll("table").forEach((table) => {
                const wrap = document.createElement("div");
                wrap.className = "table-scroll";
                table.replaceWith(wrap);
                wrap.appendChild(table);
              });
            }
          }
          // Кнопка теста — только после доступа к тексту модуля, тот же
          // принцип, что уже применяется к экзамену по отдельному уроку
          // (book.html): нет смысла сдавать тест по материалу, который не
          // дали дочитать (независимая проверка, 2026-07-19).
          if (unlocked) document.getElementById("quiz-cta").hidden = false;
          if (mod.lessons.length) renderLessons(profile?.progress);
        });
      }).catch((err) => {
        document.getElementById("module-doc").innerHTML = `<p class="field-error">${err.message}</p>`;
      });
    }
  </script>
</body>
</html>
