<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 64 64%27%3E%3Ccircle cx=%2732%27 cy=%2732%27 r=%2732%27 fill=%27%23b0842c%27/%3E%3Ctext x=%2732%27 y=%2745%27 font-size=%2734%27 text-anchor=%27middle%27 fill=%27white%27 font-family=%27serif%27%3E%D8%B4%3C/text%3E%3C/svg%3E">
<title>Модули курса — Онлайн-школа рукии</title>
<link rel="stylesheet" href="../../design/tokens.css?v=20">
<link rel="stylesheet" href="../../design/base.css?v=50">
<style>
  .path-step--locked { opacity: 0.5; pointer-events: none; cursor: default; }
</style>
</head>
<body data-zone="learn">
  <noscript><p style="text-align:center;padding:2rem;">Для работы сайта необходим JavaScript. Пожалуйста, включите его в настройках браузера.</p></noscript>
  <div id="site-header"></div>
  <main class="container">
    <h1 id="page-title">Путь ученика</h1>
    <p class="form-note" id="page-subtitle">11 этапов — от основ убеждённости до самостоятельного приёма пациентов в RUKYA Pro.</p>
    <div class="search-field">
      <input type="search" id="module-search" placeholder="Поиск по модулям и книгам…" data-placeholder-t="modules.search" aria-label="Поиск по модулям и книгам">
    </div>
    <p id="search-empty" class="form-note" data-t="modules.noResults" hidden>Ничего не найдено.</p>
    <div id="path-root"></div>
  </main>
  <div id="site-footer"></div>

  <script type="module">
    import { renderHeader, renderFooter } from "../js/layout.js?v=16";
    import { MODULES, isModuleUnlocked } from "../js/modules-data.js?v=34";
    import { statusBadgeHtml } from "../js/markdown-loader.js?v=23";
    import { t, getLang, moduleTitle, lessonTitle, localLevel } from "../js/i18n.js?v=5";
    import { watchAuth, getStudentProfile, isAdmin } from "../../integration/auth.js?v=9";

    renderHeader("learn");
    renderFooter();

    // Перевод статичных элементов страницы
    document.getElementById("page-title").textContent = t("modules.title");
    document.getElementById("page-subtitle").textContent = t("modules.subtitle");

    const root = document.getElementById("path-root");
    const emptyNote = document.getElementById("search-empty");

    // Поиск по модулям И вложенным книгам (25 книг не видны на этой странице
    // напрямую, только через модуль) — план улучшения курса, 2026-07-18,
    // третий проход, "findability". Чисто клиентская фильтрация, без бэкенда.
    // Уровень раньше был обычным текстом в приглушённом meta-цвете — на
    // глаз неотличим от статус-бейджа рядом (независимая проверка,
    // 2026-07-19). Иконка + текст, не просто цвет — доступно и дальтоникам.
    const LEVEL_ICON = { "Начальный": "○", "Средний": "◐", "Продвинутый": "●", "Beginner": "○", "Intermediate": "◐", "Advanced": "●", "Boshlang'ich": "○", "O'rta": "◐", "Yuqori": "●" };

    // Группировка по уровню — три секции с визуальным разделением
    const LEVEL_GROUPS = [
      { level: "Начальный", key: "beginner", range: "1–3" },
      { level: "Средний", key: "intermediate", range: "4–6" },
      { level: "Продвинутый", key: "advanced", range: "7–11" },
    ];

    let currentUser = null;
    let currentProgress = null;
    let currentIsAdmin = false;

    function moduleCardHtml(m, matchedLesson) {
      const locked = !!currentUser && !currentIsAdmin && !isModuleUnlocked(m.id, currentProgress);
      const lvl = localLevel(m.level);
      return `
        <a class="path-step reveal ${m.status === "certified" ? "path-step--done" : ""}${locked ? " path-step--locked" : ""}" ${locked ? "" : `href="module.html?id=${m.id}"`}>
          <span class="path-step__marker">${m.id}</span>
          <span class="path-step__body">
            <span class="path-step__main">
              <span class="path-step__title">${locked ? "🔒 " : ""}${moduleTitle(m)}</span>
              <span class="path-step__meta">
                <span><span class="level-tag" aria-hidden="true">${LEVEL_ICON[lvl] || ""}</span> ${lvl}</span>
                ${matchedLesson ? `<span>· ${matchedLesson}</span>` : ""}
              </span>
            </span>
            <span class="path-step__status">${statusBadgeHtml(m.status)}</span>
          </span>
          <span class="path-step__go" aria-hidden="true">${locked ? "🔒" : "→"}</span>
        </a>`;
    }

    function sectionHeaderHtml(g) {
      const lvl = localLevel(g.level);
      const icon = LEVEL_ICON[lvl] || LEVEL_ICON[g.level] || "";
      return `
        <div class="path-section__header reveal">
          <span class="path-section__badge" aria-hidden="true">${icon}</span>
          <span class="path-section__info">
            <span class="path-section__title">${lvl}</span>
            <span class="path-section__range">${t("nav.modules")} ${g.range}</span>
          </span>
        </div>`;
    }

    let revealObserver = null;
    if (!window.matchMedia("(prefers-reduced-motion: reduce)").matches && "IntersectionObserver" in window) {
      revealObserver = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add("is-visible");
            revealObserver.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1 });
    }

    function renderList(query) {
      const q = query.trim().toLowerCase();
      let html;
      if (!q) {
        // Группировка по уровню с секционными заголовками
        html = LEVEL_GROUPS.map((g) => {
          const mods = MODULES.filter((m) => m.level === g.level);
          if (!mods.length) return "";
          return `<section class="path-section path-section--${g.key}">
            ${sectionHeaderHtml(g)}
            <div class="path">${mods.map((m) => moduleCardHtml(m, null)).join("")}</div>
          </section>`;
        }).join("");
        emptyNote.hidden = true;
      } else {
        const matches = MODULES.map((m) => {
          const mTitle = moduleTitle(m).toLowerCase();
          const mLevel = localLevel(m.level).toLowerCase();
          if (mTitle.includes(q) || m.title.toLowerCase().includes(q) || mLevel.includes(q)) return { m, matchedLesson: null };
          const lesson = m.lessons.find((l) => lessonTitle(l).toLowerCase().includes(q) || l.title.toLowerCase().includes(q));
          return lesson ? { m, matchedLesson: lessonTitle(lesson) } : null;
        }).filter(Boolean);
        html = `<div class="path">${matches.map(({ m, matchedLesson }) => moduleCardHtml(m, matchedLesson)).join("")}</div>`;
        emptyNote.hidden = matches.length > 0;
      }
      root.innerHTML = html;
      root.querySelectorAll(".reveal").forEach((el, i) => {
        if (revealObserver) {
          el.style.transitionDelay = `${Math.min(i * 40, 400)}ms`;
          revealObserver.observe(el);
        } else {
          el.classList.add("is-visible");
        }
      });
    }

    renderList("");
    document.getElementById("module-search").addEventListener("input", (e) => renderList(e.target.value));

    // Re-render with lock status after auth resolves
    watchAuth(async (user) => {
      currentUser = user;
      if (!user) {
        currentProgress = null;
        currentIsAdmin = false;
      } else {
        const [profile, admin] = await Promise.all([getStudentProfile(user.uid), isAdmin(user.uid)]);
        currentProgress = profile?.progress || {};
        currentIsAdmin = admin;
      }
      renderList(document.getElementById("module-search").value);
    });

    document.documentElement.lang = getLang();
    document.querySelectorAll("[data-t]").forEach(el => { el.textContent = t(el.dataset.t); });
    document.querySelectorAll("[data-placeholder-t]").forEach(el => { el.placeholder = t(el.dataset.placeholderT); });
  </script>
</body>
</html>
