<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 64 64%27%3E%3Ccircle cx=%2732%27 cy=%2732%27 r=%2732%27 fill=%27%23b0842c%27/%3E%3Ctext x=%2732%27 y=%2745%27 font-size=%2734%27 text-anchor=%27middle%27 fill=%27white%27 font-family=%27serif%27%3E%D8%B4%3C/text%3E%3C/svg%3E">
<title>Модули курса — Онлайн-школа рукии</title>
<link rel="stylesheet" href="../../design/tokens.css?v=7">
<link rel="stylesheet" href="../../design/base.css?v=17">
</head>
<body data-zone="learn">
  <div id="site-header"></div>
  <main class="container" style="padding-block: var(--rp-space-6);">
    <h1>Путь ученика</h1>
    <p class="form-note">11 этапов — от основ убеждённости до самостоятельного приёма пациентов в RUKYA Pro.</p>
    <input type="search" id="module-search" placeholder="Поиск по модулям и книгам…" aria-label="Поиск по модулям и книгам"
      style="width:100%; max-width:24rem; padding: 0.65rem 1rem; margin-bottom: var(--rp-space-5); border-radius: var(--rp-radius-pill);
        border: 1px solid var(--rp-learn-border); background: var(--rp-learn-surface); color: var(--rp-learn-text); font: inherit;">
    <p id="search-empty" class="form-note" hidden>Ничего не найдено.</p>
    <div id="path-root" class="path"></div>
  </main>
  <div id="site-footer"></div>

  <script type="module">
    import { renderHeader, renderFooter } from "../js/layout.js?v=9";
    import { MODULES } from "../js/modules-data.js?v=10";
    import { statusBadgeHtml } from "../js/markdown-loader.js?v=7";

    renderHeader("learn");
    renderFooter();

    const root = document.getElementById("path-root");
    const emptyNote = document.getElementById("search-empty");

    // Поиск по модулям И вложенным книгам (25 книг не видны на этой странице
    // напрямую, только через модуль) — план улучшения курса, 2026-07-18,
    // третий проход, "findability". Чисто клиентская фильтрация, без бэкенда.
    function moduleCardHtml(m, matchedLesson) {
      return `
        <a class="path-step" href="module.html?id=${m.id}">
          <span class="path-step__marker">${m.id}</span>
          <span class="path-step__body">
            <span class="path-step__title">${m.title}</span>
            <span class="path-step__meta">${m.level}${matchedLesson ? ` · содержит книгу «${matchedLesson}»` : ""}</span>
            <div style="margin-top: 0.4rem;">${statusBadgeHtml(m.status)}</div>
          </span>
        </a>`;
    }

    function renderList(query) {
      const q = query.trim().toLowerCase();
      if (!q) {
        root.innerHTML = MODULES.map((m) => moduleCardHtml(m, null)).join("");
        emptyNote.hidden = true;
        return;
      }
      const matches = MODULES.map((m) => {
        if (m.title.toLowerCase().includes(q) || m.level.toLowerCase().includes(q)) return { m, matchedLesson: null };
        const lesson = m.lessons.find((l) => l.title.toLowerCase().includes(q));
        return lesson ? { m, matchedLesson: lesson.title } : null;
      }).filter(Boolean);
      root.innerHTML = matches.map(({ m, matchedLesson }) => moduleCardHtml(m, matchedLesson)).join("");
      emptyNote.hidden = matches.length > 0;
    }

    renderList("");
    document.getElementById("module-search").addEventListener("input", (e) => renderList(e.target.value));
  </script>
</body>
</html>
