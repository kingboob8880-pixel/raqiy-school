<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 64 64%27%3E%3Ccircle cx=%2732%27 cy=%2732%27 r=%2732%27 fill=%27%23b0842c%27/%3E%3Ctext x=%2732%27 y=%2745%27 font-size=%2734%27 text-anchor=%27middle%27 fill=%27white%27 font-family=%27serif%27%3E%D8%B4%3C/text%3E%3C/svg%3E">
<title>Модули курса — Онлайн-школа рукии</title>
<link rel="stylesheet" href="../../design/tokens.css?v=19">
<link rel="stylesheet" href="../../design/base.css?v=41">
</head>
<body data-zone="learn">
  <noscript><p style="text-align:center;padding:2rem;">Для работы сайта необходим JavaScript. Пожалуйста, включите его в настройках браузера.</p></noscript>
  <div id="site-header"></div>
  <main class="container">
    <h1>Путь ученика</h1>
    <p class="form-note">11 этапов — от основ убеждённости до самостоятельного приёма пациентов в RUKYA Pro.</p>
    <div class="search-field">
      <input type="search" id="module-search" placeholder="Поиск по модулям и книгам…" aria-label="Поиск по модулям и книгам">
    </div>
    <p id="search-empty" class="form-note" hidden>Ничего не найдено.</p>
    <div id="path-root" class="path"></div>
  </main>
  <div id="site-footer"></div>

  <script type="module">
    import { renderHeader, renderFooter } from "../js/layout.js?v=14";
    import { MODULES } from "../js/modules-data.js?v=21";
    import { statusBadgeHtml } from "../js/markdown-loader.js?v=17";

    renderHeader("learn");
    renderFooter();

    const root = document.getElementById("path-root");
    const emptyNote = document.getElementById("search-empty");

    // Поиск по модулям И вложенным книгам (25 книг не видны на этой странице
    // напрямую, только через модуль) — план улучшения курса, 2026-07-18,
    // третий проход, "findability". Чисто клиентская фильтрация, без бэкенда.
    // Уровень раньше был обычным текстом в приглушённом meta-цвете — на
    // глаз неотличим от статус-бейджа рядом (независимая проверка,
    // 2026-07-19). Иконка + текст, не просто цвет — доступно и дальтоникам.
    const LEVEL_ICON = { "Начальный": "○", "Средний": "◐", "Продвинутый": "●" };

    // Карточка "пути" — полировка внешнего вида (запрос "переработай вид,
    // чтобы было красиво", 2026-07-20): маркер+тело разделены на
    // .path-step__main (заголовок/уровень/совпадение поиска) и
    // .path-step__status (бейдж статуса) — раньше бейдж лип под заголовком
    // отдельным блоком, визуально не было понятно, что это два разных типа
    // информации. Стрелка .path-step__go — та же подсказка "кликабельно",
    // что уже стоит на .lesson-link/тест-карточках, здесь её не было.
    // .path-step--done (уже существующий класс/стиль маркера) переиспользован
    // для статуса "certified" — подтверждённые шейхом модули визуально
    // выделяются заливкой маркера, а не только текстом бейджа рядом.
    function moduleCardHtml(m, matchedLesson) {
      return `
        <a class="path-step reveal ${m.status === "certified" ? "path-step--done" : ""}" href="module.html?id=${m.id}">
          <span class="path-step__marker">${m.id}</span>
          <span class="path-step__body">
            <span class="path-step__main">
              <span class="path-step__title">${m.title}</span>
              <span class="path-step__meta">
                <span><span class="level-tag" aria-hidden="true">${LEVEL_ICON[m.level] || ""}</span> ${m.level}</span>
                ${matchedLesson ? `<span>· содержит книгу «${matchedLesson}»</span>` : ""}
              </span>
            </span>
            <span class="path-step__status">${statusBadgeHtml(m.status)}</span>
          </span>
          <span class="path-step__go" aria-hidden="true">→</span>
        </a>`;
    }

    // Лёгкое проявление карточек при прокрутке (тот же .reveal, что на
    // лендинге, design/base.css) — раньше все 11 карточек появлялись разом.
    let revealObserver = null;
    if (!window.matchMedia("(prefers-reduced-motion: reduce)").matches && "IntersectionObserver" in window) {
      revealObserver = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add("is-visible");
            revealObserver.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1 });
    }

    function renderList(query) {
      const q = query.trim().toLowerCase();
      let html;
      if (!q) {
        html = MODULES.map((m) => moduleCardHtml(m, null)).join("");
        emptyNote.hidden = true;
      } else {
        const matches = MODULES.map((m) => {
          if (m.title.toLowerCase().includes(q) || m.level.toLowerCase().includes(q)) return { m, matchedLesson: null };
          const lesson = m.lessons.find((l) => l.title.toLowerCase().includes(q));
          return lesson ? { m, matchedLesson: lesson.title } : null;
        }).filter(Boolean);
        html = matches.map(({ m, matchedLesson }) => moduleCardHtml(m, matchedLesson)).join("");
        emptyNote.hidden = matches.length > 0;
      }
      root.innerHTML = html;
      root.querySelectorAll(".reveal").forEach((el, i) => {
        if (revealObserver) {
          el.style.transitionDelay = `${Math.min(i * 40, 400)}ms`;
          revealObserver.observe(el);
        } else {
          el.classList.add("is-visible");
        }
      });
    }

    renderList("");
    document.getElementById("module-search").addEventListener("input", (e) => renderList(e.target.value));
  </script>
</body>
</html>
