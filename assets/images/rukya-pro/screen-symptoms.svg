<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'Segoe UI','Inter',sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.25"/></filter>
  </defs>
  <rect width="800" height="520" rx="12" fill="#0c1a0f"/>
  <!-- Sidebar -->
  <rect width="56" height="520" rx="12" fill="#14291a"/>
  <circle cx="28" cy="28" r="14" fill="#22c55e" opacity="0.2"/>
  <text x="28" y="33" text-anchor="middle" fill="#22c55e" font-size="14" font-weight="700">R</text>

  <g transform="translate(72,16)">
    <!-- Top bar: back + stepper -->
    <text x="0" y="16" fill="#86efac" font-size="12">← Отмена</text>

    <!-- Step indicator -->
    <g transform="translate(120,0)">
      <circle cx="0" cy="12" r="10" fill="#22c55e"/>
      <text x="0" y="16" text-anchor="middle" fill="white" font-size="9" font-weight="700">✓</text>
      <line x1="10" y1="12" x2="100" y2="12" stroke="#166534" stroke-width="2"/>
      <circle cx="110" cy="12" r="10" fill="#22c55e"/>
      <text x="110" y="16" text-anchor="middle" fill="white" font-size="9" font-weight="700">2</text>
      <line x1="120" y1="12" x2="210" y2="12" stroke="#166534" stroke-width="2"/>
      <circle cx="220" cy="12" r="10" fill="#166534"/>
      <text x="220" y="16" text-anchor="middle" fill="#86efac" font-size="9">3</text>
      <line x1="230" y1="12" x2="320" y2="12" stroke="#166534" stroke-width="2"/>
      <circle cx="330" cy="12" r="10" fill="#166534"/>
      <text x="330" y="16" text-anchor="middle" fill="#86efac" font-size="9">4</text>
      <line x1="340" y1="12" x2="430" y2="12" stroke="#166534" stroke-width="2"/>
      <circle cx="440" cy="12" r="10" fill="#166534"/>
      <text x="440" y="16" text-anchor="middle" fill="#86efac" font-size="9">5</text>

      <text x="0" y="36" text-anchor="middle" fill="#86efac" font-size="8">Пациент</text>
      <text x="110" y="36" text-anchor="middle" fill="#22c55e" font-size="8" font-weight="600">Симптомы</text>
      <text x="220" y="36" text-anchor="middle" fill="#86efac" font-size="8">Диагноз</text>
      <text x="330" y="36" text-anchor="middle" fill="#86efac" font-size="8">Программа</text>
      <text x="440" y="36" text-anchor="middle" fill="#86efac" font-size="8">Подтверж.</text>
    </g>

    <!-- Progress bar -->
    <rect x="0" y="48" width="712" height="4" rx="2" fill="#166534"/>
    <rect x="0" y="48" width="178" height="4" rx="2" fill="#22c55e"/>

    <!-- Card -->
    <rect x="0" y="68" width="712" height="420" rx="16" fill="#14291a" filter="url(#shadow)"/>

    <text x="24" y="96" fill="#dcfce7" font-size="15" font-weight="600">📊 Симптомы</text>

    <!-- Category tabs -->
    <g transform="translate(24,112)">
      <rect width="100" height="28" rx="14" fill="#22c55e"/>
      <text x="50" y="19" text-anchor="middle" fill="white" font-size="10" font-weight="600">🩺 Физические</text>

      <rect x="108" width="110" height="28" rx="14" fill="transparent" stroke="#166534" stroke-width="1"/>
      <text x="163" y="19" text-anchor="middle" fill="#86efac" font-size="10">💭 Эмоциональные</text>

      <rect x="226" width="88" height="28" rx="14" fill="transparent" stroke="#166534" stroke-width="1"/>
      <text x="270" y="19" text-anchor="middle" fill="#86efac" font-size="10">🤲 Духовные</text>

      <rect x="322" width="58" height="28" rx="14" fill="transparent" stroke="#166534" stroke-width="1"/>
      <text x="351" y="19" text-anchor="middle" fill="#86efac" font-size="10">🌙 Сон</text>

      <rect x="388" width="90" height="28" rx="14" fill="transparent" stroke="#166534" stroke-width="1"/>
      <text x="433" y="19" text-anchor="middle" fill="#86efac" font-size="10">👥 Социальные</text>
    </g>

    <!-- Symptom grid -->
    <g transform="translate(24,156)">
      <!-- Selected symptom -->
      <rect width="214" height="64" rx="12" fill="#22c55e" stroke="#22c55e" stroke-width="2"/>
      <text x="14" y="22" fill="white" font-size="11" font-weight="500">Головные боли</text>
      <g transform="translate(14,34)">
        <rect width="34" height="5" rx="3" fill="rgba(255,255,255,0.85)"/>
        <rect x="38" width="34" height="5" rx="3" fill="rgba(255,255,255,0.85)"/>
        <rect x="76" width="34" height="5" rx="3" fill="rgba(255,255,255,0.85)"/>
        <rect x="114" width="34" height="5" rx="3" fill="rgba(255,255,255,0.25)"/>
        <rect x="152" width="34" height="5" rx="3" fill="rgba(255,255,255,0.25)"/>
      </g>

      <!-- Selected symptom 2 -->
      <rect x="224" width="214" height="64" rx="12" fill="#22c55e" stroke="#22c55e" stroke-width="2"/>
      <text x="238" y="22" fill="white" font-size="11" font-weight="500">Боль в груди</text>
      <g transform="translate(238,34)">
        <rect width="34" height="5" rx="3" fill="rgba(255,255,255,0.85)"/>
        <rect x="38" width="34" height="5" rx="3" fill="rgba(255,255,255,0.85)"/>
        <rect x="76" width="34" height="5" rx="3" fill="rgba(255,255,255,0.85)"/>
        <rect x="114" width="34" height="5" rx="3" fill="rgba(255,255,255,0.85)"/>
        <rect x="152" width="34" height="5" rx="3" fill="rgba(255,255,255,0.25)"/>
      </g>

      <!-- Unselected -->
      <rect x="448" width="214" height="64" rx="12" fill="#14291a" stroke="#166534" stroke-width="2"/>
      <text x="462" y="22" fill="#dcfce7" font-size="11" font-weight="500">Тошнота</text>

      <!-- Row 2 -->
      <rect y="74" width="214" height="64" rx="12" fill="#14291a" stroke="#166534" stroke-width="2"/>
      <text x="14" y="96" fill="#dcfce7" font-size="11" font-weight="500">Онемение конечностей</text>

      <rect x="224" y="74" width="214" height="64" rx="12" fill="#22c55e" stroke="#22c55e" stroke-width="2"/>
      <text x="238" y="96" fill="white" font-size="11" font-weight="500">Жжение в теле</text>
      <g transform="translate(238,108)">
        <rect width="34" height="5" rx="3" fill="rgba(255,255,255,0.85)"/>
        <rect x="38" width="34" height="5" rx="3" fill="rgba(255,255,255,0.85)"/>
        <rect x="76" width="34" height="5" rx="3" fill="rgba(255,255,255,0.85)"/>
        <rect x="114" width="34" height="5" rx="3" fill="rgba(255,255,255,0.85)"/>
        <rect x="152" width="34" height="5" rx="3" fill="rgba(255,255,255,0.85)"/>
      </g>

      <rect x="448" y="74" width="214" height="64" rx="12" fill="#14291a" stroke="#166534" stroke-width="2"/>
      <text x="462" y="96" fill="#dcfce7" font-size="11" font-weight="500">Слабость в теле</text>
    </g>

    <!-- Selected summary -->
    <g transform="translate(24,310)">
      <rect width="664" height="48" rx="12" fill="#0c1a0f"/>
      <text x="14" y="20" fill="#dcfce7" font-size="11" font-weight="500">Выбрано: 3 симптомов</text>
      <g transform="translate(14,30)">
        <rect width="104" height="18" rx="9" fill="#22c55e"/>
        <text x="52" y="13" text-anchor="middle" fill="white" font-size="8">Головные боли (3/5)</text>
        <rect x="110" width="82" height="18" rx="9" fill="#22c55e"/>
        <text x="151" y="13" text-anchor="middle" fill="white" font-size="8">Боль в груди (4/5)</text>
        <rect x="198" width="96" height="18" rx="9" fill="#22c55e"/>
        <text x="246" y="13" text-anchor="middle" fill="white" font-size="8">Жжение в теле (5/5)</text>
      </g>
    </g>

    <!-- Buttons -->
    <text x="24" y="388" fill="#86efac" font-size="12">← Назад</text>
    <rect x="570" y="372" width="130" height="36" rx="10" fill="#22c55e"/>
    <text x="635" y="394" text-anchor="middle" fill="white" font-size="12" font-weight="600">Диагностировать</text>
  </g>
</svg>