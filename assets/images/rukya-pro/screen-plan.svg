<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'Segoe UI','Inter',sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.25"/></filter>
  </defs>
  <rect width="800" height="520" rx="12" fill="#0c1a0f"/>
  <rect width="56" height="520" rx="12" fill="#14291a"/>
  <circle cx="28" cy="28" r="14" fill="#22c55e" opacity="0.2"/>
  <text x="28" y="33" text-anchor="middle" fill="#22c55e" font-size="14" font-weight="700">R</text>

  <g transform="translate(72,16)">
    <!-- Progress bar at 80% -->
    <rect x="0" y="8" width="712" height="4" rx="2" fill="#166534"/>
    <rect x="0" y="8" width="534" height="4" rx="2" fill="#22c55e"/>

    <!-- Card -->
    <rect x="0" y="28" width="712" height="470" rx="16" fill="#14291a" filter="url(#shadow)"/>

    <g transform="translate(24,52)">
      <text x="0" y="0" fill="#dcfce7" font-size="15" font-weight="600">📋 Выбор программы</text>

      <!-- Program 1 — selected -->
      <rect x="0" y="20" width="664" height="90" rx="14" fill="transparent" stroke="#22c55e" stroke-width="2"/>
      <rect x="0" y="20" width="664" height="90" rx="14" fill="#22c55e" opacity="0.08"/>
      <text x="16" y="46" fill="#dcfce7" font-size="12" font-weight="600">Программа против сихра (стандартная)</text>
      <text x="622" y="42" fill="#22c55e" font-size="11">✓</text>
      <text x="16" y="64" fill="#86efac" font-size="10">Рукья от колдовства: чтение над водой, обтирание, ежедневные азкары</text>
      <g transform="translate(16,74)">
        <rect width="44" height="16" rx="8" fill="#06b6d420"/>
        <text x="22" y="12" text-anchor="middle" fill="#06b6d4" font-size="8" font-weight="600">сихр</text>
        <rect x="50" width="52" height="16" rx="8" fill="#06b6d420"/>
        <text x="76" y="12" text-anchor="middle" fill="#06b6d4" font-size="8" font-weight="600">рукья</text>
        <rect x="108" width="44" height="16" rx="8" fill="#06b6d420"/>
        <text x="130" y="12" text-anchor="middle" fill="#06b6d4" font-size="8" font-weight="600">вода</text>
      </g>
      <rect x="540" y="30" width="72" height="18" rx="9" fill="#eab30820"/>
      <text x="576" y="43" text-anchor="middle" fill="#eab308" font-size="9" font-weight="600">Средняя</text>
      <text x="540" y="66" fill="#dcfce7" font-size="11" font-weight="600">21 дней</text>

      <!-- Program 2 — unselected -->
      <rect x="0" y="120" width="664" height="90" rx="14" fill="transparent" stroke="#166534" stroke-width="1.5"/>
      <text x="16" y="146" fill="#dcfce7" font-size="12" font-weight="600">Программа от сглаза ('айн)</text>
      <text x="16" y="164" fill="#86efac" font-size="10">Гусль (омовение), чтение аль-Фатихи, аль-Му'аввизат, 7-дневный курс</text>
      <g transform="translate(16,174)">
        <rect width="50" height="16" rx="8" fill="#06b6d420"/>
        <text x="25" y="12" text-anchor="middle" fill="#06b6d4" font-size="8" font-weight="600">сглаз</text>
        <rect x="56" width="48" height="16" rx="8" fill="#06b6d420"/>
        <text x="80" y="12" text-anchor="middle" fill="#06b6d4" font-size="8" font-weight="600">гусль</text>
      </g>
      <rect x="540" y="130" width="64" height="18" rx="9" fill="#22c55e20"/>
      <text x="572" y="143" text-anchor="middle" fill="#22c55e" font-size="9" font-weight="600">Лёгкая</text>
      <text x="540" y="166" fill="#dcfce7" font-size="11" font-weight="600">7 дней</text>

      <!-- Program 3 — unselected -->
      <rect x="0" y="220" width="664" height="90" rx="14" fill="transparent" stroke="#166534" stroke-width="1.5"/>
      <text x="16" y="246" fill="#dcfce7" font-size="12" font-weight="600">Комплексная программа (масс + джинн)</text>
      <text x="16" y="264" fill="#86efac" font-size="10">Рукья от одержимости, метод изгнания, ежедневные азкары защиты</text>
      <g transform="translate(16,274)">
        <rect width="44" height="16" rx="8" fill="#06b6d420"/>
        <text x="22" y="12" text-anchor="middle" fill="#06b6d4" font-size="8" font-weight="600">масс</text>
        <rect x="50" width="58" height="16" rx="8" fill="#06b6d420"/>
        <text x="79" y="12" text-anchor="middle" fill="#06b6d4" font-size="8" font-weight="600">изгнание</text>
      </g>
      <rect x="540" y="230" width="72" height="18" rx="9" fill="#ef444420"/>
      <text x="576" y="243" text-anchor="middle" fill="#ef4444" font-size="9" font-weight="600">Сложная</text>
      <text x="540" y="266" fill="#dcfce7" font-size="11" font-weight="600">30 дней</text>

      <!-- Program 4 — unselected -->
      <rect x="0" y="320" width="664" height="90" rx="14" fill="transparent" stroke="#166534" stroke-width="1.5"/>
      <text x="16" y="346" fill="#dcfce7" font-size="12" font-weight="600">Универсальное очищение</text>
      <text x="16" y="364" fill="#86efac" font-size="10">Базовая рукья + азкары утренние/вечерние + чтение над водой</text>
      <g transform="translate(16,374)">
        <rect width="76" height="16" rx="8" fill="#06b6d420"/>
        <text x="38" y="12" text-anchor="middle" fill="#06b6d4" font-size="8" font-weight="600">универсальная</text>
        <rect x="82" width="54" height="16" rx="8" fill="#06b6d420"/>
        <text x="109" y="12" text-anchor="middle" fill="#06b6d4" font-size="8" font-weight="600">азкары</text>
      </g>
      <rect x="540" y="330" width="64" height="18" rx="9" fill="#22c55e20"/>
      <text x="572" y="343" text-anchor="middle" fill="#22c55e" font-size="9" font-weight="600">Лёгкая</text>
      <text x="540" y="366" fill="#dcfce7" font-size="11" font-weight="600">14 дней</text>
    </g>

    <!-- Buttons -->
    <text x="24" y="468" fill="#86efac" font-size="12">← Назад</text>
    <rect x="590" y="450" width="110" height="36" rx="10" fill="#22c55e"/>
    <text x="645" y="472" text-anchor="middle" fill="white" font-size="12" font-weight="600">Далее →</text>
  </g>
</svg>