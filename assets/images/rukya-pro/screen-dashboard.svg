<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'Segoe UI','Inter',sans-serif">
  <defs>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#22c55e"/><stop offset="100%" stop-color="#14b8a6"/></linearGradient>
    <linearGradient id="avatar" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#22c55e"/><stop offset="100%" stop-color="#14b8a6"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.25"/></filter>
  </defs>
  <!-- BG -->
  <rect width="800" height="520" rx="12" fill="#0c1a0f"/>
  <!-- Sidebar -->
  <rect width="56" height="520" rx="12" fill="#14291a"/>
  <circle cx="28" cy="28" r="14" fill="#22c55e" opacity="0.2"/>
  <text x="28" y="33" text-anchor="middle" fill="#22c55e" font-size="14" font-weight="700">R</text>
  <rect x="16" y="60" width="24" height="24" rx="6" fill="#22c55e" opacity="0.15"/>
  <rect x="20" y="66" width="16" height="2" rx="1" fill="#86efac"/>
  <rect x="20" y="71" width="12" height="2" rx="1" fill="#86efac"/>
  <rect x="20" y="76" width="16" height="2" rx="1" fill="#86efac"/>
  <rect x="16" y="96" width="24" height="24" rx="6" fill="transparent"/>
  <circle cx="28" cy="108" r="6" fill="none" stroke="#86efac" stroke-width="1.5" opacity="0.4"/>
  <rect x="16" y="132" width="24" height="24" rx="6" fill="transparent"/>
  <rect x="22" y="138" width="12" height="12" rx="2" fill="none" stroke="#86efac" stroke-width="1.5" opacity="0.4"/>

  <!-- Main content -->
  <g transform="translate(72,16)">
    <!-- Hero banner -->
    <rect width="712" height="80" rx="16" fill="url(#hero)" filter="url(#shadow)"/>
    <circle cx="680" cy="-10" r="50" fill="white" opacity="0.05"/>
    <circle cx="700" cy="70" r="70" fill="white" opacity="0.05"/>
    <text x="20" y="28" fill="white" opacity="0.7" font-size="11">Ассаляму алейкум</text>
    <text x="20" y="50" fill="white" font-size="18" font-weight="700">ПЛАН ИСЦЕЛЕНИЯ</text>
    <text x="20" y="68" fill="white" opacity="0.7" font-size="11">Ash-Shifa · Метод Абу Мухаммада</text>
    <rect x="590" y="22" width="110" height="36" rx="10" fill="white" opacity="0.2" stroke="white" stroke-opacity="0.3" stroke-width="1"/>
    <text x="618" y="44" fill="white" font-size="12" font-weight="600">+ Новый случай</text>

    <!-- Stats row -->
    <g transform="translate(0,96)">
      <rect width="170" height="64" rx="12" fill="#14291a" filter="url(#shadow)"/>
      <circle cx="20" cy="32" r="14" fill="#22c55e" opacity="0.15"/>
      <text x="20" y="36" text-anchor="middle" fill="#22c55e" font-size="12">👥</text>
      <text x="44" y="28" fill="#86efac" font-size="10">Пациентов</text>
      <text x="44" y="48" fill="#dcfce7" font-size="20" font-weight="700">12</text>

      <g transform="translate(182,0)">
        <rect width="170" height="64" rx="12" fill="#14291a" filter="url(#shadow)"/>
        <circle cx="20" cy="32" r="14" fill="#22c55e" opacity="0.15"/>
        <text x="20" y="36" text-anchor="middle" fill="#22c55e" font-size="12">📊</text>
        <text x="44" y="28" fill="#86efac" font-size="10">Активных планов</text>
        <text x="44" y="48" fill="#dcfce7" font-size="20" font-weight="700">5</text>
      </g>
      <g transform="translate(364,0)">
        <rect width="170" height="64" rx="12" fill="#14291a" filter="url(#shadow)"/>
        <circle cx="20" cy="32" r="14" fill="#06b6d4" opacity="0.15"/>
        <text x="20" y="36" text-anchor="middle" fill="#06b6d4" font-size="12">✓</text>
        <text x="44" y="28" fill="#86efac" font-size="10">Завершено</text>
        <text x="44" y="48" fill="#dcfce7" font-size="20" font-weight="700">23</text>
      </g>
      <g transform="translate(546,0)">
        <rect width="166" height="64" rx="12" fill="#14291a" filter="url(#shadow)"/>
        <circle cx="20" cy="32" r="14" fill="#14b8a6" opacity="0.15"/>
        <text x="20" y="36" text-anchor="middle" fill="#14b8a6" font-size="12">📋</text>
        <text x="44" y="28" fill="#86efac" font-size="10">Всего планов</text>
        <text x="44" y="48" fill="#dcfce7" font-size="20" font-weight="700">28</text>
      </g>
    </g>

    <!-- Quick actions -->
    <text x="0" y="190" fill="#86efac" font-size="9" font-weight="600" letter-spacing="1.5">БЫСТРЫЕ ДЕЙСТВИЯ</text>
    <g transform="translate(0,200)">
      <rect width="170" height="72" rx="12" fill="#14291a" filter="url(#shadow)"/>
      <rect x="14" y="12" width="32" height="32" rx="10" fill="#22c55e" opacity="0.15"/>
      <text x="30" y="33" text-anchor="middle" fill="#22c55e" font-size="16">+</text>
      <text x="14" y="58" fill="#dcfce7" font-size="11" font-weight="600">Новый случай</text>
      <text x="14" y="70" fill="#86efac" font-size="9">Пациент + план</text>

      <g transform="translate(182,0)">
        <rect width="170" height="72" rx="12" fill="#14291a" filter="url(#shadow)"/>
        <rect x="14" y="12" width="32" height="32" rx="10" fill="#06b6d4" opacity="0.15"/>
        <text x="30" y="33" text-anchor="middle" fill="#06b6d4" font-size="14">📊</text>
        <text x="14" y="58" fill="#dcfce7" font-size="11" font-weight="600">Диагностика</text>
        <text x="14" y="70" fill="#86efac" font-size="9">Rule-based анализ</text>
      </g>
      <g transform="translate(364,0)">
        <rect width="170" height="72" rx="12" fill="#14291a" filter="url(#shadow)"/>
        <rect x="14" y="12" width="32" height="32" rx="10" fill="#14b8a6" opacity="0.15"/>
        <text x="30" y="33" text-anchor="middle" fill="#14b8a6" font-size="14">📖</text>
        <text x="14" y="58" fill="#dcfce7" font-size="11" font-weight="600">Библиотека</text>
        <text x="14" y="70" fill="#86efac" font-size="9">Формулы, программы</text>
      </g>
      <g transform="translate(546,0)">
        <rect width="166" height="72" rx="12" fill="#14291a" filter="url(#shadow)"/>
        <rect x="14" y="12" width="32" height="32" rx="10" fill="#eab308" opacity="0.15"/>
        <text x="30" y="33" text-anchor="middle" fill="#eab308" font-size="14">⬆</text>
        <text x="14" y="58" fill="#dcfce7" font-size="11" font-weight="600">Импорт</text>
        <text x="14" y="70" fill="#86efac" font-size="9">Загрузить данные</text>
      </g>
    </g>

    <!-- Active plans -->
    <g transform="translate(0,290)">
      <text x="0" y="12" fill="#dcfce7" font-size="13" font-weight="600">● Активные планы</text>
      <circle cx="4" cy="8" r="4" fill="#4ade80"/>

      <g transform="translate(0,24)">
        <rect width="712" height="52" rx="10" fill="#14291a"/>
        <circle cx="30" cy="26" r="16" fill="url(#avatar)"/>
        <text x="30" y="31" text-anchor="middle" fill="white" font-size="10" font-weight="700">АМ</text>
        <text x="56" y="22" fill="#dcfce7" font-size="12" font-weight="500">Очищение от сглаза</text>
        <text x="56" y="38" fill="#86efac" font-size="10">Мухаммад Ахмад · 14 дней</text>
        <rect x="490" y="24" width="160" height="5" rx="3" fill="#166534"/>
        <rect x="490" y="24" width="112" height="5" rx="3" fill="#22c55e"/>
        <text x="665" y="30" fill="#22c55e" font-size="11" font-weight="700">70%</text>
      </g>
      <g transform="translate(0,84)">
        <rect width="712" height="52" rx="10" fill="#14291a"/>
        <circle cx="30" cy="26" r="16" fill="url(#avatar)"/>
        <text x="30" y="31" text-anchor="middle" fill="white" font-size="10" font-weight="700">ФИ</text>
        <text x="56" y="22" fill="#dcfce7" font-size="12" font-weight="500">Программа против сихра</text>
        <text x="56" y="38" fill="#86efac" font-size="10">Фатима Ибрахим · 21 день</text>
        <rect x="490" y="24" width="160" height="5" rx="3" fill="#166534"/>
        <rect x="490" y="24" width="48" height="5" rx="3" fill="#22c55e"/>
        <text x="665" y="30" fill="#22c55e" font-size="11" font-weight="700">30%</text>
      </g>
    </g>
  </g>
</svg>